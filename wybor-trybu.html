<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Wybor trybu gry</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111827;
			color: #f9fafb;
		}

		.panel {
			width: min(560px, 94vw);
			padding: 28px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
			display: grid;
			gap: 12px;
			text-align: center;
		}

		h1 {
			margin: 0;
			font-size: 28px;
		}

		.info {
			margin: 0;
			color: #d1d5db;
		}

		.buttons {
			display: grid;
			gap: 10px;
			margin-top: 4px;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 13px 14px;
			font-size: 16px;
			font-weight: 700;
			background: #2563eb;
			color: #fff;
			cursor: pointer;
		}

		button.secondary {
			background: #374151;
		}
	</style>
</head>
<body>
	<div class="panel">
		<h1>Wybierz tryb gry</h1>
		<p class="info" id="meInfo"></p>
		<div class="buttons">
			<button id="classicBtn">Tryb klasyczny</button>
			<button id="deezerBtn">Quiz muzyczny Deezer</button>
			<button id="changeNickBtn" class="secondary">Zmien ksywe</button>
		</div>
	</div>

	<script>
		const meInfo = document.getElementById("meInfo");
		const classicBtn = document.getElementById("classicBtn");
		const deezerBtn = document.getElementById("deezerBtn");
		const changeNickBtn = document.getElementById("changeNickBtn");

		function getStorageKey(prefix) {
			return "buzzer_" + prefix;
		}

		function safeName(value) {
			const text = String(value || "").trim();
			if (!text) {
				return "";
			}
			return text.slice(0, 20);
		}

		function isValidPlayer(player) {
			return Number.isInteger(player) && player >= 1 && player <= 8;
		}

		function goToNickChoice() {
			window.location.href = "wybor-ksywy.html";
		}

		{
			const player = Number(localStorage.getItem(getStorageKey("player")));
			const name = safeName(localStorage.getItem(getStorageKey("name")));
			if (!isValidPlayer(player) || !name) {
				goToNickChoice();
			} else {
				meInfo.textContent = "Zalogowany: " + name + " (gracz " + player + ")";
			}
		}

		classicBtn.addEventListener("click", () => {
			window.location.href = "szybkie-guziki.html";
		});
		deezerBtn.addEventListener("click", () => {
			window.location.href = "quiz-muzyczny.html";
		});
		changeNickBtn.addEventListener("click", () => {
			localStorage.removeItem(getStorageKey("player"));
			localStorage.removeItem(getStorageKey("name"));
			goToNickChoice();
		});
	</script>
</body>
</html>
