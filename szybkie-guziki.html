<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Szybki buzzer online</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111827;
			color: #f9fafb;
		}

		.panel {
			width: min(760px, 95vw);
			padding: 28px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
			text-align: center;
		}

		h1 {
			margin: 0 0 12px;
			font-size: 28px;
		}

		.info {
			margin: 0 0 16px;
			font-size: 16px;
			color: #d1d5db;
		}

		.setup {
			display: grid;
			gap: 12px;
			max-width: 420px;
			margin: 0 auto;
		}

		.field {
			display: flex;
			flex-direction: column;
			text-align: left;
			gap: 6px;
		}

		label {
			font-size: 14px;
			color: #9ca3af;
		}

		input,
		select {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 10px 12px;
			font-size: 16px;
		}

		.primary {
			background: #2563eb;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 12px 14px;
			font-size: 16px;
			font-weight: bold;
			background: #374151;
			color: #fff;
			cursor: pointer;
			transition: transform 0.08s ease, background 0.2s ease;
		}

		button:hover {
			background: #1d4ed8;
		}

		button:active {
			transform: scale(0.97);
		}

		button[disabled] {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.hidden {
			display: none;
		}

		.buzzer-area {
			display: grid;
			gap: 14px;
		}

		.big-buzzer {
			padding: 34px 10px;
			font-size: clamp(34px, 10vw, 84px);
			border-radius: 16px;
			background: #2563eb;
		}

		.winner {
			background: #059669 !important;
		}

		.result {
			min-height: 34px;
			margin-top: 8px;
			font-size: 24px;
			font-weight: 700;
		}

		.me {
			font-size: 15px;
			color: #9ca3af;
		}

		.actions {
			margin-top: 14px;
			display: flex;
			justify-content: center;
			gap: 10px;
		}

		.status {
			margin-top: 8px;
			font-size: 13px;
			color: #9ca3af;
		}

		.video-controls {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
			align-items: center;
		}

		.video-wrap {
			border-radius: 12px;
			overflow: hidden;
			background: #0b1220;
			border: 1px solid #374151;
			min-height: 220px;
		}

		.video-frame {
			display: block;
			width: 100%;
			aspect-ratio: 16 / 9;
			border: 0;
		}

		.video-empty {
			min-height: 220px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #9ca3af;
			font-size: 14px;
			padding: 12px;
		}

		.score-controls {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}

		.good-btn {
			background: #059669;
		}

		.bad-btn {
			background: #dc2626;
		}

		.my-score {
			margin: 0;
			font-size: 18px;
			font-weight: 700;
		}

		.scoreboard {
			border: 1px solid #374151;
			border-radius: 12px;
			overflow: hidden;
		}

		.score-row {
			display: grid;
			grid-template-columns: 1fr auto;
			padding: 8px 10px;
			gap: 8px;
			background: #0f172a;
			border-bottom: 1px solid #1f2937;
		}

		.score-row:last-child {
			border-bottom: 0;
		}

		.score-row.me-row {
			background: #172554;
		}

		.score-points {
			font-weight: 700;
		}
	</style>
</head>
<body>
	<div class="panel">
		<h1>Kto pierwszy, ten odpowiada</h1>
		<p class="info">Kazdy widzi tylko swoj guzik, a klik jednego blokuje runde u wszystkich.</p>

		<div id="setupView" class="setup">
			<div class="field">
				<label for="playerSelect">Twoj numer gracza</label>
				<select id="playerSelect">
					<option value="1">Gracz 1</option>
					<option value="2">Gracz 2</option>
					<option value="3">Gracz 3</option>
					<option value="4">Gracz 4</option>
					<option value="5">Gracz 5</option>
					<option value="6">Gracz 6</option>
					<option value="7">Gracz 7</option>
					<option value="8">Gracz 8</option>
				</select>
			</div>
			<div class="field">
				<label for="nickInput">Twoja ksywka</label>
				<input id="nickInput" type="text" maxlength="20" value="" placeholder="np. Kosa" />
			</div>
			<button id="joinBtn" class="primary">Wejdz do gry</button>
		</div>

		<div id="gameView" class="buzzer-area hidden">
			<p class="me" id="meInfo"></p>
			<div class="video-controls">
				<input id="ytInput" type="text" placeholder="Wklej link YouTube (watch, youtu.be, shorts)" />
				<button id="setVideoBtn">Ustaw film</button>
			</div>
			<div class="video-wrap" id="videoWrap">
				<div class="video-empty">Brak filmu - wklej link YouTube.</div>
			</div>
			<div class="score-controls">
				<button id="goodBtn" class="good-btn">Dobrze (+1)</button>
				<button id="badBtn" class="bad-btn">Zle (-1)</button>
			</div>
			<p class="my-score" id="myScore">Twoje punkty: 0</p>
			<div id="scoreboard" class="scoreboard"></div>
			<button id="buzzerBtn" class="big-buzzer">KLIK</button>
			<p class="result" id="result">Czekam na pierwszy klik...</p>
			<div class="actions">
				<button id="resetBtn">Reset rundy</button>
				<button id="changeBtn">Zmien gracza</button>
			</div>
			<p id="status" class="status">Status: laczenie...</p>
		</div>
	</div>

	<script>
		// Najwazniejsze: domyslnie uzywamy tego samego hosta co strona, a recznie mozna nadpisac window.API_BASE_URL.
		const API_BASE_URL = window.API_BASE_URL || window.location.origin;
		const MAX_PLAYERS = 8;

		const setupView = document.getElementById("setupView");
		const gameView = document.getElementById("gameView");
		const playerSelect = document.getElementById("playerSelect");
		const nickInput = document.getElementById("nickInput");
		const joinBtn = document.getElementById("joinBtn");
		const meInfo = document.getElementById("meInfo");
		const buzzerBtn = document.getElementById("buzzerBtn");
		const result = document.getElementById("result");
		const resetBtn = document.getElementById("resetBtn");
		const changeBtn = document.getElementById("changeBtn");
		const statusEl = document.getElementById("status");
		const ytInput = document.getElementById("ytInput");
		const setVideoBtn = document.getElementById("setVideoBtn");
		const videoWrap = document.getElementById("videoWrap");
		const goodBtn = document.getElementById("goodBtn");
		const badBtn = document.getElementById("badBtn");
		const myScore = document.getElementById("myScore");
		const scoreboard = document.getElementById("scoreboard");

		let myPlayer = null;
		let myName = "";
		let currentState = null;
		let pollTimer = null;
		let currentVideoUrl = "";
		let isVideoPaused = false;
		let currentScores = {};
		let currentPlayerNames = {};

		function getStorageKey(prefix) {
			return "buzzer_" + prefix;
		}

		function safeName(value, player) {
			const text = String(value || "").trim();
			if (text.length > 0) {
				return text.slice(0, 20);
			}
			return "Gracz " + player;
		}

		function isValidPlayer(player) {
			return Number.isInteger(player) && player >= 1 && player <= MAX_PLAYERS;
		}

		function buildApiUrl(path) {
			const base = String(API_BASE_URL || "").replace(/\/+$/, "");
			return base + path;
		}

		function setStatus(text) {
			statusEl.textContent = "Status: " + text;
		}

		function toIntScore(value) {
			const parsed = Number(value);
			if (!Number.isFinite(parsed)) {
				return 0;
			}
			return Math.trunc(parsed);
		}

		function getPlayerNameFromState(player) {
			const key = String(player);
			const savedName = currentPlayerNames[key];
			if (savedName && String(savedName).trim().length > 0) {
				return String(savedName);
			}
			return "Gracz " + player;
		}

		function renderScoreboard() {
			const rows = [];
			for (let i = 1; i <= MAX_PLAYERS; i = i + 1) {
				const key = String(i);
				const points = toIntScore(currentScores[key]);
				const name = getPlayerNameFromState(i);
				const rowClass = i === myPlayer ? "score-row me-row" : "score-row";
				rows.push(
					'<div class="' +
						rowClass +
						'"><span>' +
						name +
						' (P' +
						i +
						')</span><span class="score-points">' +
						points +
						"</span></div>"
				);
			}
			scoreboard.innerHTML = rows.join("");
			if (myPlayer && isValidPlayer(myPlayer)) {
				const myPoints = toIntScore(currentScores[String(myPlayer)]);
				myScore.textContent = "Twoje punkty: " + myPoints;
				return;
			}
			myScore.textContent = "Twoje punkty: 0";
		}

		function extractYouTubeId(urlValue) {
			const text = String(urlValue || "").trim();
			if (!text) {
				return "";
			}
			try {
				const url = new URL(text);
				const host = (url.hostname || "").toLowerCase();
				if (host === "youtu.be") {
					return (url.pathname || "").replace("/", "").slice(0, 20);
				}
				if (host.indexOf("youtube.com") !== -1 || host.indexOf("youtube-nocookie.com") !== -1) {
					const v = url.searchParams.get("v");
					if (v) {
						return v.slice(0, 20);
					}
					const path = (url.pathname || "").split("/").filter(Boolean);
					if (path.length >= 2 && (path[0] === "embed" || path[0] === "shorts" || path[0] === "live")) {
						return path[1].slice(0, 20);
					}
				}
			} catch (err) {
				return "";
			}
			return "";
		}

		function buildEmbedUrl(videoId) {
			return "https://www.youtube.com/embed/" + videoId + "?enablejsapi=1&autoplay=1&rel=0&playsinline=1";
		}

		function sendVideoCommand(commandName) {
			const frame = document.getElementById("ytFrame");
			if (!frame || !frame.contentWindow) {
				return;
			}
			frame.contentWindow.postMessage(
				JSON.stringify({
					event: "command",
					func: commandName,
					args: []
				}),
				"*"
			);
		}

		function renderVideo(urlValue) {
			const text = String(urlValue || "").trim();
			const videoId = extractYouTubeId(text);
			currentVideoUrl = text;
			if (!videoId) {
				videoWrap.innerHTML = '<div class="video-empty">Brak filmu - wklej link YouTube.</div>';
				return;
			}
			const embedUrl = buildEmbedUrl(videoId);
			videoWrap.innerHTML = '<iframe id="ytFrame" class="video-frame" src="' + embedUrl + '" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
		}

		function syncVideoPause(pausedValue) {
			const paused = Boolean(pausedValue);
			if (paused === isVideoPaused) {
				return;
			}
			isVideoPaused = paused;
			if (paused) {
				sendVideoCommand("pauseVideo");
				return;
			}
			sendVideoCommand("playVideo");
		}

		function setJoinedUi(isJoined) {
			setupView.classList.toggle("hidden", isJoined);
			gameView.classList.toggle("hidden", !isJoined);
		}

		function persistIdentity() {
			localStorage.setItem(getStorageKey("player"), String(myPlayer));
			localStorage.setItem(getStorageKey("name"), myName);
		}

		function restoreIdentity() {
			const storedPlayer = localStorage.getItem(getStorageKey("player"));
			const storedName = localStorage.getItem(getStorageKey("name"));
			const storedPlayerNumber = Number(storedPlayer);
			if (isValidPlayer(storedPlayerNumber)) {
				playerSelect.value = storedPlayer;
			}
			if (storedName) {
				nickInput.value = storedName;
			}
		}

		function updateByState(state) {
			currentState = state;
			currentScores = state.scores || {};
			currentPlayerNames = state.playerNames || {};
			const winner = state.winner;
			const winnerName = state.winnerName || ("Gracz " + winner);
			const winnerTime = state.winnerTimeMs;
			buzzerBtn.classList.remove("winner");
			if ((state.videoUrl || "") !== currentVideoUrl) {
				renderVideo(state.videoUrl || "");
			}
			syncVideoPause(state.videoPaused);

			if (winner === null) {
				result.textContent = "Czekam na pierwszy klik...";
				buzzerBtn.disabled = false;
				renderScoreboard();
				return;
			}

			result.textContent = winnerName + " kliknal(a) pierwszy! Czas: " + winnerTime + " ms";
			buzzerBtn.disabled = true;
			if (Number(winner) === Number(myPlayer)) {
				buzzerBtn.classList.add("winner");
			}
			renderScoreboard();
		}

		async function fetchJson(url, options) {
			const response = await fetch(buildApiUrl(url), options || {});
			if (!response.ok) {
				throw new Error("HTTP " + response.status);
			}
			return await response.json();
		}

		async function refreshState() {
			try {
				const state = await fetchJson("/api/buzzer-state");
				updateByState(state);
				setStatus("online");
			} catch (err) {
				setStatus("brak polaczenia z serwerem");
			}
		}

		async function clickBuzzer() {
			if (!myPlayer) {
				return;
			}
			if (currentState && currentState.winner !== null) {
				return;
			}
			buzzerBtn.disabled = true;
			try {
				const payload = {
					player: myPlayer,
					name: myName
				};
				const data = await fetchJson("/api/buzzer-click", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(payload)
				});
				updateByState(data.state);
				setStatus("online");
			} catch (err) {
				buzzerBtn.disabled = false;
				setStatus("blad wyslania klikniecia");
			}
		}

		async function resetRound() {
			try {
				const data = await fetchJson("/api/buzzer-reset", {
					method: "POST"
				});
				updateByState(data.state);
				setStatus("online");
			} catch (err) {
				setStatus("blad resetu");
			}
		}

		async function setVideo() {
			const rawUrl = ytInput.value.trim();
			if (!rawUrl) {
				setStatus("wklej najpierw link YouTube");
				return;
			}
			if (!extractYouTubeId(rawUrl)) {
				setStatus("niepoprawny link YouTube");
				return;
			}
			setVideoBtn.disabled = true;
			try {
				const data = await fetchJson("/api/buzzer-video", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						videoUrl: rawUrl
					})
				});
				updateByState(data.state);
				setStatus("film ustawiony");
			} catch (err) {
				setStatus("blad ustawiania filmu");
			} finally {
				setVideoBtn.disabled = false;
			}
		}

		async function updateScore(delta) {
			if (!myPlayer || !isValidPlayer(myPlayer)) {
				return;
			}
			goodBtn.disabled = true;
			badBtn.disabled = true;
			try {
				const data = await fetchJson("/api/buzzer-score", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						player: myPlayer,
						name: myName,
						delta: delta
					})
				});
				updateByState(data.state);
				setStatus("punkty zaktualizowane");
			} catch (err) {
				setStatus("blad zmiany punktow");
			} finally {
				goodBtn.disabled = false;
				badBtn.disabled = false;
			}
		}

		async function registerPlayer() {
			if (!myPlayer || !isValidPlayer(myPlayer)) {
				return;
			}
			try {
				const data = await fetchJson("/api/buzzer-join", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						player: myPlayer,
						name: myName
					})
				});
				updateByState(data.state);
			} catch (err) {
				setStatus("blad rejestracji gracza");
			}
		}

		function startPolling() {
			if (pollTimer) {
				clearInterval(pollTimer);
			}
			pollTimer = setInterval(refreshState, 300);
		}

		function joinGame() {
			const playerValue = playerSelect.value;
			const player = Number(playerValue);
			if (!isValidPlayer(player)) {
				return;
			}
			myPlayer = player;
			myName = safeName(nickInput.value, player);
			meInfo.textContent = "Jestes: " + myName + " (gracz " + myPlayer + ")";
			persistIdentity();
			setJoinedUi(true);
			startPolling();
			registerPlayer();
			refreshState();
		}

		function leaveGame() {
			myPlayer = null;
			myName = "";
			if (pollTimer) {
				clearInterval(pollTimer);
				pollTimer = null;
			}
			setJoinedUi(false);
			setStatus("offline");
		}

		joinBtn.addEventListener("click", joinGame);
		buzzerBtn.addEventListener("click", clickBuzzer);
		resetBtn.addEventListener("click", resetRound);
		changeBtn.addEventListener("click", leaveGame);
		goodBtn.addEventListener("click", () => {
			updateScore(1);
		});
		badBtn.addEventListener("click", () => {
			updateScore(-1);
		});
		setVideoBtn.addEventListener("click", setVideo);
		ytInput.addEventListener("keydown", (event) => {
			if (event.key === "Enter") {
				setVideo();
			}
		});

		restoreIdentity();
		if (nickInput.value.trim().length === 0) {
			const player = Number(playerSelect.value);
			nickInput.value = "Gracz " + player;
		}
		playerSelect.addEventListener("change", () => {
			const player = Number(playerSelect.value);
			const value = nickInput.value.trim();
			if (value.length > 0) {
				return;
			}
			nickInput.value = "Gracz " + player;
		});

		if (window.location.hostname.indexOf("github.io") !== -1 && API_BASE_URL.indexOf("127.0.0.1") !== -1) {
			setStatus("ustaw poprawny API_BASE_URL do zdalnego backendu");
		}
		renderScoreboard();
	</script>
</body>
</html>
