<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Szybki buzzer online</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111827;
			color: #f9fafb;
		}

		.app-layout {
			width: min(1620px, 98vw);
			display: grid;
			grid-template-columns: minmax(0, 1fr) 340px;
			gap: 24px;
			align-items: start;
		}

		.panel {
			width: 100%;
			padding: 28px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
			text-align: center;
		}

		.score-panel {
			padding: 16px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
			position: sticky;
			top: 12px;
			display: grid;
			gap: 10px;
		}

		h1 {
			margin: 0 0 12px;
			font-size: 28px;
		}

		.info {
			margin: 0 0 16px;
			font-size: 16px;
			color: #d1d5db;
		}

		.setup {
			display: grid;
			gap: 12px;
			max-width: 420px;
			margin: 0 auto;
		}

		.field {
			display: flex;
			flex-direction: column;
			text-align: left;
			gap: 6px;
		}

		label {
			font-size: 14px;
			color: #9ca3af;
		}

		input,
		select {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 10px 12px;
			font-size: 16px;
		}

		.primary {
			background: #2563eb;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 12px 14px;
			font-size: 16px;
			font-weight: bold;
			background: #374151;
			color: #fff;
			cursor: pointer;
			transition: transform 0.08s ease, background 0.2s ease;
		}

		button:hover {
			background: #1d4ed8;
		}

		button:active {
			transform: scale(0.97);
		}

		button[disabled] {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.hidden {
			display: none;
		}

		.buzzer-area {
			display: grid;
			gap: 14px;
		}

		.game-main {
			display: grid;
			gap: 14px;
		}

		.big-buzzer {
			padding: 34px 10px;
			font-size: clamp(34px, 10vw, 84px);
			border-radius: 16px;
			background: #2563eb;
		}

		.winner {
			background: #059669 !important;
		}

		.result {
			min-height: 34px;
			margin-top: 8px;
			font-size: 24px;
			font-weight: 700;
		}

		.me {
			font-size: 15px;
			color: #9ca3af;
		}

		.actions {
			margin-top: 14px;
			display: flex;
			justify-content: center;
			gap: 10px;
		}

		.status {
			margin-top: 8px;
			font-size: 13px;
			color: #9ca3af;
		}

		.video-controls {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
			align-items: center;
		}

		.quiz-admin {
			display: grid;
			gap: 8px;
			background: #111827;
			border: 1px solid #374151;
			border-radius: 10px;
			padding: 10px;
			text-align: left;
		}

		.quiz-search {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
		}

		.quiz-list {
			max-height: 180px;
			overflow: auto;
			border: 1px solid #374151;
			border-radius: 8px;
			background: #0f172a;
		}

		.quiz-item {
			width: 100%;
			border: 0;
			border-bottom: 1px solid #1f2937;
			border-radius: 0;
			text-align: left;
			padding: 9px 10px;
			background: transparent;
		}

		.quiz-item:last-child {
			border-bottom: 0;
		}

		.quiz-clip-actions {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
		}

		.quiz-state {
			margin: 0;
			font-size: 13px;
			color: #9ca3af;
			text-align: left;
		}

		.volume-controls {
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			gap: 8px;
			background: #111827;
			border: 1px solid #374151;
			border-radius: 10px;
			padding: 8px 10px;
		}

		.volume-controls input[type="range"] {
			width: 100%;
		}

		.video-wrap {
			position: relative;
			border-radius: 12px;
			overflow: hidden;
			background: #0b1220;
			border: 1px solid #374151;
			min-height: 360px;
		}

		.video-frame {
			display: block;
			width: 100%;
			aspect-ratio: 16 / 9;
			border: 0;
		}

		.video-empty {
			min-height: 360px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #9ca3af;
			font-size: 14px;
			padding: 12px;
		}

		.video-lock-overlay {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 12px;
			font-size: 14px;
			font-weight: 700;
			color: #f3f4f6;
			background: rgba(15, 23, 42, 0.7);
			z-index: 2;
			pointer-events: all;
		}

		.score-controls {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}

		.good-btn {
			background: #059669;
		}

		.bad-btn {
			background: #dc2626;
		}

		.my-score {
			margin: 0;
			font-size: 18px;
			font-weight: 700;
		}

		.scoreboard {
			border: 1px solid #374151;
			border-radius: 12px;
			overflow: hidden;
		}

		.score-row {
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			padding: 8px 10px;
			gap: 8px;
			background: #0f172a;
			border-bottom: 1px solid #1f2937;
		}

		.sb-ava {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			overflow: hidden;
			flex-shrink: 0;
			background: #334155;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 14px;
			font-weight: 800;
			color: #e2e8f0;
		}

		.sb-avatar-img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.score-name-cell {
			min-width: 0;
			word-break: break-word;
		}

		.score-row:last-child {
			border-bottom: 0;
		}

		.score-row.me-row {
			background: #172554;
		}

		.score-points {
			font-weight: 700;
		}

		@media (max-width: 960px) {
			.app-layout {
				grid-template-columns: 1fr;
			}

			.score-panel {
				position: static;
			}

			.video-wrap,
			.video-empty {
				min-height: 220px;
			}
		}
	</style>
</head>
<body>
	<div class="app-layout">
	<div class="panel">
		<h1>Kto pierwszy, ten odpowiada</h1>
		<p class="info">Kazdy widzi tylko swoj guzik, a klik jednego blokuje runde u wszystkich.</p>

		<div id="gameView" class="buzzer-area">
			<div class="game-main">
				<p class="me" id="meInfo"></p>
				<div id="videoControls" class="video-controls">
					<input id="ytInput" type="text" placeholder="Wklej link YouTube (watch, youtu.be, shorts)" />
					<button id="setVideoBtn">Ustaw film</button>
				</div>
				<div class="video-wrap" id="videoWrap">
					<div id="videoStage">
						<div class="video-empty">Brak filmu - wklej link YouTube.</div>
					</div>
					<div id="videoLockOverlay" class="video-lock-overlay hidden">Tylko gracz "sobik" steruje filmem</div>
				</div>
				<div class="volume-controls">
					<span>Glosnosc</span>
					<input id="volumeRange" type="range" min="0" max="100" step="1" value="100" />
					<span id="volumeLabel">100%</span>
				</div>
				<div id="scoreControls" class="score-controls">
					<button id="goodBtn" class="good-btn">Dobrze (+1)</button>
					<button id="badBtn" class="bad-btn">Zle (-1)</button>
				</div>
				<button id="buzzerBtn" class="big-buzzer">KLIK</button>
				<p class="result" id="result">Czekam na pierwszy klik...</p>
				<div class="actions">
					<button id="resetBtn">Reset rundy</button>
					<button id="changeBtn">Zmien gracza</button>
				</div>
			</div>
			<p id="status" class="status">Status: laczenie...</p>
		</div>
	</div>
	<aside class="score-panel">
		<p class="my-score" id="myScore">Twoje punkty: 0</p>
		<div id="scoreboard" class="scoreboard"></div>
	</aside>
	</div>

	<script>
		// Najwazniejsze: domyslnie uzywamy tego samego hosta co strona, a recznie mozna nadpisac window.API_BASE_URL.
		const API_BASE_URL = window.API_BASE_URL || window.location.origin;
		const MAX_PLAYERS = 8;
		const VIDEO_CONTROLLER_NAME = "sobik";

		const meInfo = document.getElementById("meInfo");
		const videoControls = document.getElementById("videoControls");
		const buzzerBtn = document.getElementById("buzzerBtn");
		const result = document.getElementById("result");
		const resetBtn = document.getElementById("resetBtn");
		const changeBtn = document.getElementById("changeBtn");
		const statusEl = document.getElementById("status");
		const ytInput = document.getElementById("ytInput");
		const setVideoBtn = document.getElementById("setVideoBtn");
		const volumeRange = document.getElementById("volumeRange");
		const volumeLabel = document.getElementById("volumeLabel");
		const videoWrap = document.getElementById("videoWrap");
		const videoStage = document.getElementById("videoStage");
		const videoLockOverlay = document.getElementById("videoLockOverlay");
		const scoreControls = document.getElementById("scoreControls");
		const goodBtn = document.getElementById("goodBtn");
		const badBtn = document.getElementById("badBtn");
		const myScore = document.getElementById("myScore");
		const scoreboard = document.getElementById("scoreboard");

		let myPlayer = null;
		let myName = "";
		let currentState = null;
		let pollTimer = null;
		let currentVideoUrl = "";
		let isVideoPaused = false;
		let currentVideoTimeSec = 0;
		let currentScores = {};
		let currentPlayerNames = {};
		let currentPlayerAvatars = {};
		let lastStateUpdateMs = 0;
		let ytApiReady = false;
		let ytPlayer = null;
		let currentVideoId = "";
		let pendingVideoId = "";
		let videoSyncTimer = null;
		let isApplyingRemoteVideoState = false;
		let localVolume = 100;

		function getStorageKey(prefix) {
			return "buzzer_" + prefix;
		}

		function getVolumeStorageKey() {
			return getStorageKey("video_volume");
		}

		function safeName(value, player) {
			const text = String(value || "").trim();
			if (text.length > 0) {
				return text.slice(0, 20);
			}
			return "Gracz " + player;
		}

		function normalizeName(value) {
			return String(value || "").trim().toLowerCase();
		}

		function isVideoController() {
			return normalizeName(myName) === VIDEO_CONTROLLER_NAME;
		}

		function isValidPlayer(player) {
			return Number.isInteger(player) && player >= 1 && player <= MAX_PLAYERS;
		}

		function buildApiUrl(path) {
			const base = String(API_BASE_URL || "").replace(/\/+$/, "");
			return base + path;
		}

		function setStatus(text) {
			statusEl.textContent = "Status: " + text;
		}

		function toIntScore(value) {
			const parsed = Number(value);
			if (!Number.isFinite(parsed)) {
				return 0;
			}
			return Math.trunc(parsed);
		}

		function getPlayerNameFromState(player) {
			const key = String(player);
			const savedName = currentPlayerNames[key];
			if (savedName && String(savedName).trim().length > 0) {
				return String(savedName);
			}
			return "Gracz " + player;
		}

		function escapeHtml(text) {
			const s = String(text || "");
			return s
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/"/g, "&quot;")
				.replace(/'/g, "&#39;");
		}

		function buildAvatarHtml(key, displayName) {
			const path = currentPlayerAvatars[key];
			let src = "";
			if (path) {
				src = buildApiUrl(String(path)) + "?v=" + String(lastStateUpdateMs);
			}
			if (src) {
				return (
					'<span class="sb-ava"><img class="sb-avatar-img" src="' +
					escapeHtml(src) +
					'" alt="" width="40" height="40" loading="lazy" /></span>'
				);
			}
			const ch = String(displayName || "?").trim().charAt(0).toUpperCase() || "?";
			return '<span class="sb-ava">' + escapeHtml(ch) + "</span>";
		}

		function renderScoreboard() {
			const rows = [];
			for (let i = 1; i <= MAX_PLAYERS; i = i + 1) {
				const key = String(i);
				const points = toIntScore(currentScores[key]);
				const name = getPlayerNameFromState(i);
				const rowClass = i === myPlayer ? "score-row me-row" : "score-row";
				rows.push(
					'<div class="' +
						rowClass +
						'">' +
						buildAvatarHtml(key, name) +
						'<span class="score-name-cell">' +
						escapeHtml(name) +
						" (P" +
						i +
						')</span><span class="score-points">' +
						points +
						"</span></div>"
				);
			}
			scoreboard.innerHTML = rows.join("");
			if (myPlayer && isValidPlayer(myPlayer)) {
				const myPoints = toIntScore(currentScores[String(myPlayer)]);
				myScore.textContent = "Twoje punkty: " + myPoints;
				return;
			}
			myScore.textContent = "Twoje punkty: 0";
		}

		function extractYouTubeId(urlValue) {
			const text = String(urlValue || "").trim();
			if (!text) {
				return "";
			}
			try {
				const url = new URL(text);
				const host = (url.hostname || "").toLowerCase();
				if (host === "youtu.be") {
					return (url.pathname || "").replace("/", "").slice(0, 20);
				}
				if (host.indexOf("youtube.com") !== -1 || host.indexOf("youtube-nocookie.com") !== -1) {
					const v = url.searchParams.get("v");
					if (v) {
						return v.slice(0, 20);
					}
					const path = (url.pathname || "").split("/").filter(Boolean);
					if (path.length >= 2 && (path[0] === "embed" || path[0] === "shorts" || path[0] === "live")) {
						return path[1].slice(0, 20);
					}
				}
			} catch (err) {
				return "";
			}
			return "";
		}

		function buildEmbedUrl(videoId) {
			return "https://www.youtube.com/embed/" + videoId + "?enablejsapi=1&autoplay=1&rel=0&playsinline=1";
		}

		function updateVideoLockUi() {
			videoLockOverlay.classList.toggle("hidden", isVideoController());
		}

		function updateVideoControlsUi() {
			videoControls.classList.toggle("hidden", !isVideoController());
		}

		function updateAdminActionsUi() {
			scoreControls.classList.toggle("hidden", !isVideoController());
		}

		function clampVolume(value) {
			const num = Number(value);
			if (!Number.isFinite(num)) {
				return 100;
			}
			if (num < 0) {
				return 0;
			}
			if (num > 100) {
				return 100;
			}
			return Math.round(num);
		}

		function updateVolumeLabel() {
			volumeLabel.textContent = String(localVolume) + "%";
		}

		function loadLocalVolume() {
			const raw = localStorage.getItem(getVolumeStorageKey());
			localVolume = clampVolume(raw);
			volumeRange.value = String(localVolume);
			updateVolumeLabel();
		}

		function applyVolumeToPlayer() {
			if (!ytPlayer || typeof ytPlayer.setVolume !== "function") {
				return;
			}
			// Najważniejsze: glosnosc jest lokalna dla przegladarki i nie synchronizuje sie z innymi graczami.
			ytPlayer.setVolume(localVolume);
		}

		function ensureYouTubeApi() {
			if (window.YT && window.YT.Player) {
				ytApiReady = true;
				if (pendingVideoId) {
					createYouTubePlayer(pendingVideoId);
				}
				return;
			}
			if (document.getElementById("ytIframeApiScript")) {
				return;
			}
			const script = document.createElement("script");
			script.id = "ytIframeApiScript";
			script.src = "https://www.youtube.com/iframe_api";
			document.head.appendChild(script);
		}

		window.onYouTubeIframeAPIReady = function() {
			ytApiReady = true;
			if (pendingVideoId) {
				createYouTubePlayer(pendingVideoId);
			}
		};

		function destroyYouTubePlayer() {
			if (ytPlayer && typeof ytPlayer.destroy === "function") {
				ytPlayer.destroy();
			}
			ytPlayer = null;
		}

		function createYouTubePlayer(videoId) {
			if (!ytApiReady || !(window.YT && window.YT.Player)) {
				pendingVideoId = videoId;
				return;
			}
			pendingVideoId = "";
			currentVideoId = videoId;
			videoStage.innerHTML = '<div id="ytFrame" class="video-frame"></div>';
			destroyYouTubePlayer();
			ytPlayer = new window.YT.Player("ytFrame", {
				videoId: videoId,
				playerVars: {
					autoplay: 1,
					rel: 0,
					playsinline: 1
				},
				events: {
					onReady: function() {
						applyVolumeToPlayer();
						syncVideoState();
					},
					onStateChange: function() {
						if (!isApplyingRemoteVideoState) {
							sendMyVideoSync();
						}
					}
				}
			});
		}

		function renderVideo(urlValue) {
			const text = String(urlValue || "").trim();
			const videoId = extractYouTubeId(text);
			currentVideoUrl = text;
			if (!videoId) {
				currentVideoId = "";
				pendingVideoId = "";
				destroyYouTubePlayer();
				videoStage.innerHTML = '<div class="video-empty">Brak filmu - wklej link YouTube.</div>';
				return;
			}
			if (currentVideoId === videoId && ytPlayer) {
				return;
			}
			pendingVideoId = videoId;
			ensureYouTubeApi();
			if (ytApiReady) {
				createYouTubePlayer(videoId);
			}
		}

		function getLocalVideoTimeSec() {
			if (!ytPlayer || typeof ytPlayer.getCurrentTime !== "function") {
				return 0;
			}
			const value = Number(ytPlayer.getCurrentTime());
			if (!Number.isFinite(value) || value < 0) {
				return 0;
			}
			return value;
		}

		function isLocalVideoPaused() {
			if (!ytPlayer || typeof ytPlayer.getPlayerState !== "function" || !window.YT) {
				return true;
			}
			const state = ytPlayer.getPlayerState();
			return state !== window.YT.PlayerState.PLAYING && state !== window.YT.PlayerState.BUFFERING;
		}

		function syncVideoState() {
			if (!ytPlayer || typeof ytPlayer.seekTo !== "function") {
				return;
			}
			const targetTime = Number(currentVideoTimeSec || 0);
			if (!isVideoController()) {
				const currentTime = getLocalVideoTimeSec();
				if (Math.abs(currentTime - targetTime) > 1.2) {
					isApplyingRemoteVideoState = true;
					ytPlayer.seekTo(targetTime, true);
					isApplyingRemoteVideoState = false;
				}
			}
			isApplyingRemoteVideoState = true;
			if (isVideoPaused) {
				if (typeof ytPlayer.pauseVideo === "function") {
					ytPlayer.pauseVideo();
				}
			} else {
				if (typeof ytPlayer.playVideo === "function") {
					ytPlayer.playVideo();
				}
			}
			isApplyingRemoteVideoState = false;
		}

		async function sendMyVideoSync() {
			if (!isVideoController() || !ytPlayer || !myName) {
				return;
			}
			try {
				const data = await fetchJson("/api/buzzer-video-sync", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						name: myName,
						timeSec: getLocalVideoTimeSec(),
						paused: isLocalVideoPaused()
					})
				});
				currentVideoTimeSec = Number(data.state.videoTimeSec || 0);
				isVideoPaused = Boolean(data.state.videoPaused);
			} catch (err) {
				return;
			}
		}

		function startVideoSyncLoop() {
			if (videoSyncTimer) {
				clearInterval(videoSyncTimer);
			}
			videoSyncTimer = setInterval(() => {
				sendMyVideoSync();
			}, 700);
		}

		function stopVideoSyncLoop() {
			if (!videoSyncTimer) {
				return;
			}
			clearInterval(videoSyncTimer);
			videoSyncTimer = null;
		}

		function goToSetupView() {
			window.location.href = "wybor-ksywy.html";
		}

		function sendLeaveBeacon(player, name) {
			if (!isValidPlayer(player) || !name) {
				return;
			}
			if (typeof navigator.sendBeacon !== "function") {
				return;
			}
			const payload = JSON.stringify({
				player: player,
				name: name
			});
			const blob = new Blob([payload], { type: "application/json" });
			navigator.sendBeacon(buildApiUrl("/api/buzzer-leave"), blob);
		}

		async function leavePlayerServer(player, name) {
			if (!isValidPlayer(player) || !name) {
				return;
			}
			try {
				await fetch(buildApiUrl("/api/buzzer-leave"), {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						player: player,
						name: name
					}),
					keepalive: true
				});
			} catch (err) {
				return;
			}
		}

		function persistIdentity() {
			if (myPlayer && isValidPlayer(myPlayer)) {
				localStorage.setItem(getStorageKey("player"), String(myPlayer));
			}
			localStorage.setItem(getStorageKey("name"), myName);
		}

		function updateByState(state) {
			currentState = state;
			currentScores = state.scores || {};
			currentPlayerNames = state.playerNames || {};
			currentPlayerAvatars = state.playerAvatars || {};
			lastStateUpdateMs = Number(state.lastUpdateMs || 0);
			currentVideoTimeSec = Number(state.videoTimeSec || 0);
			const winner = state.winner;
			const winnerName = state.winnerName || ("Gracz " + winner);
			const winnerTime = state.winnerTimeMs;
			buzzerBtn.classList.remove("winner");
			if ((state.videoUrl || "") !== currentVideoUrl) {
				renderVideo(state.videoUrl || "");
			}
			isVideoPaused = Boolean(state.videoPaused);
			updateVideoLockUi();
			updateVideoControlsUi();
			updateAdminActionsUi();
			syncVideoState();

			if (winner === null) {
				result.textContent = "Czekam na pierwszy klik...";
				buzzerBtn.disabled = false;
				renderScoreboard();
				return;
			}

			result.textContent = winnerName + " kliknal(a) pierwszy! Czas: " + winnerTime + " ms";
			buzzerBtn.disabled = true;
			if (Number(winner) === Number(myPlayer)) {
				buzzerBtn.classList.add("winner");
			}
			renderScoreboard();
		}

		async function fetchJson(url, options) {
			const response = await fetch(buildApiUrl(url), options || {});
			if (!response.ok) {
				throw new Error("HTTP " + response.status);
			}
			return await response.json();
		}

		async function refreshState() {
			try {
				const state = await fetchJson("/api/buzzer-state");
				updateByState(state);
				setStatus("online");
			} catch (err) {
				setStatus("brak polaczenia z serwerem");
			}
		}

		async function clickBuzzer() {
			if (!myPlayer) {
				return;
			}
			if (currentState && currentState.winner !== null) {
				return;
			}
			buzzerBtn.disabled = true;
			try {
				const payload = {
					player: myPlayer,
					name: myName
				};
				const data = await fetchJson("/api/buzzer-click", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(payload)
				});
				updateByState(data.state);
				setStatus("online");
			} catch (err) {
				buzzerBtn.disabled = false;
				setStatus("blad wyslania klikniecia");
			}
		}

		async function resetRound() {
			try {
				const data = await fetchJson("/api/buzzer-reset", {
					method: "POST"
				});
				updateByState(data.state);
				setStatus("online");
			} catch (err) {
				setStatus("blad resetu");
			}
		}

		async function setVideo() {
			if (!isVideoController()) {
				setStatus("tylko sobik moze ustawic film");
				return;
			}
			const rawUrl = ytInput.value.trim();
			if (!rawUrl) {
				setStatus("wklej najpierw link YouTube");
				return;
			}
			if (!extractYouTubeId(rawUrl)) {
				setStatus("niepoprawny link YouTube");
				return;
			}
			setVideoBtn.disabled = true;
			try {
				const data = await fetchJson("/api/buzzer-video", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						name: myName,
						videoUrl: rawUrl
					})
				});
				updateByState(data.state);
				setStatus("film ustawiony");
			} catch (err) {
				setStatus("blad ustawiania filmu");
			} finally {
				setVideoBtn.disabled = false;
			}
		}

		async function updateScore(delta) {
			if (!isVideoController()) {
				setStatus("punkty moze przyznawac tylko sobik");
				return;
			}
			const targetPlayer = Number(currentState && currentState.winner);
			if (!isValidPlayer(targetPlayer)) {
				setStatus("najpierw ktos musi wygrac runde");
				return;
			}
			goodBtn.disabled = true;
			badBtn.disabled = true;
			try {
				const data = await fetchJson("/api/buzzer-score", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						name: myName,
						targetPlayer: targetPlayer,
						delta: delta
					})
				});
				updateByState(data.state);
				setStatus("punkty zaktualizowane");
			} catch (err) {
				setStatus("blad zmiany punktow");
			} finally {
				goodBtn.disabled = false;
				badBtn.disabled = false;
			}
		}

		function startPolling() {
			if (pollTimer) {
				clearInterval(pollTimer);
			}
			pollTimer = setInterval(refreshState, 300);
		}

		function leaveGame() {
			const leavingPlayer = myPlayer;
			const leavingName = myName;
			myPlayer = null;
			myName = "";
			localStorage.removeItem(getStorageKey("player"));
			localStorage.removeItem(getStorageKey("name"));
			leavePlayerServer(leavingPlayer, leavingName);
			stopVideoSyncLoop();
			if (pollTimer) {
				clearInterval(pollTimer);
				pollTimer = null;
			}
			updateVideoLockUi();
			updateVideoControlsUi();
			setStatus("offline");
			goToSetupView();
		}

		buzzerBtn.addEventListener("click", clickBuzzer);
		resetBtn.addEventListener("click", resetRound);
		changeBtn.addEventListener("click", leaveGame);
		goodBtn.addEventListener("click", () => {
			updateScore(1);
		});
		badBtn.addEventListener("click", () => {
			updateScore(-1);
		});
		setVideoBtn.addEventListener("click", setVideo);
		ytInput.addEventListener("keydown", (event) => {
			if (event.key === "Enter") {
				setVideo();
			}
		});
		volumeRange.addEventListener("input", () => {
			localVolume = clampVolume(volumeRange.value);
			volumeRange.value = String(localVolume);
			localStorage.setItem(getVolumeStorageKey(), String(localVolume));
			updateVolumeLabel();
			applyVolumeToPlayer();
		});
		window.addEventListener("pagehide", () => {
			sendLeaveBeacon(myPlayer, myName);
		});

		{
			const storedPlayer = Number(localStorage.getItem(getStorageKey("player")));
			const storedName = String(localStorage.getItem(getStorageKey("name")) || "").trim();
			if (!isValidPlayer(storedPlayer) || !storedName) {
				goToSetupView();
			} else {
				myPlayer = storedPlayer;
				myName = safeName(storedName, storedPlayer);
				meInfo.textContent = "Jestes: " + myName + " (gracz " + myPlayer + ")";
				updateVideoLockUi();
				updateVideoControlsUi();
				startPolling();
				startVideoSyncLoop();
				refreshState();
			}
		}

		if (window.location.hostname.indexOf("github.io") !== -1 && API_BASE_URL.indexOf("127.0.0.1") !== -1) {
			setStatus("ustaw poprawny API_BASE_URL do zdalnego backendu");
		}
		loadLocalVolume();
		updateVideoLockUi();
		updateVideoControlsUi();
		updateAdminActionsUi();
		renderScoreboard();
	</script>
</body>
</html>
