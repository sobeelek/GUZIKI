<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Wybor ksywy</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111827;
			color: #f9fafb;
		}

		.panel {
			width: min(500px, 92vw);
			padding: 28px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
			text-align: center;
			display: grid;
			gap: 12px;
		}

		h1 {
			margin: 0;
			font-size: 28px;
		}

		.info {
			margin: 0;
			font-size: 15px;
			color: #d1d5db;
		}

		label {
			text-align: left;
			font-size: 14px;
			color: #9ca3af;
		}

		input {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 11px 12px;
			font-size: 16px;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 12px 14px;
			font-size: 16px;
			font-weight: bold;
			background: #2563eb;
			color: #fff;
			cursor: pointer;
			transition: transform 0.08s ease, background 0.2s ease;
		}

		button:hover {
			background: #1d4ed8;
		}

		button:active {
			transform: scale(0.97);
		}

		button[disabled] {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.status {
			min-height: 22px;
			margin: 0;
			font-size: 14px;
			color: #9ca3af;
		}

		.hidden {
			display: none;
		}
	</style>
</head>
<body>
	<div class="panel">
		<h1>Wejscie do gry</h1>
		<p class="info">Wpisz ksywe, a numer gracza przydzieli sie automatycznie.</p>
		<label for="nickInput">Ksywka</label>
		<input id="nickInput" type="text" maxlength="20" placeholder="sobik" />
		<div id="passwordWrap" class="hidden">
			<label for="passwordInput">Haslo admina</label>
			<input id="passwordInput" type="password" maxlength="50" placeholder="Haslo dla sobik" />
		</div>
		<button id="joinBtn">Wejdz do gry</button>
		<p id="status" class="status"></p>
	</div>

	<script>
		const API_BASE_URL = window.API_BASE_URL || window.location.origin;
		const MAX_PLAYERS = 8;
		const nickInput = document.getElementById("nickInput");
		const passwordWrap = document.getElementById("passwordWrap");
		const passwordInput = document.getElementById("passwordInput");
		const joinBtn = document.getElementById("joinBtn");
		const statusEl = document.getElementById("status");

		function getStorageKey(prefix) {
			return "buzzer_" + prefix;
		}

		function safeName(value) {
			const text = String(value || "").trim();
			if (!text) {
				return "";
			}
			return text.slice(0, 20);
		}

		function isValidPlayer(player) {
			return Number.isInteger(player) && player >= 1 && player <= MAX_PLAYERS;
		}

		function buildApiUrl(path) {
			const base = String(API_BASE_URL || "").replace(/\/+$/, "");
			return base + path;
		}

		function isAdminName(name) {
			return safeName(name).toLowerCase() === "sobik";
		}

		function updatePasswordUi() {
			const show = isAdminName(nickInput.value);
			passwordWrap.classList.toggle("hidden", !show);
			if (!show) {
				passwordInput.value = "";
			}
		}

		function setStatus(text) {
			statusEl.textContent = text;
		}

		function goToGame() {
			window.location.href = "wybor-trybu.html";
		}

		function clearStoredIdentity() {
			localStorage.removeItem(getStorageKey("player"));
			localStorage.removeItem(getStorageKey("name"));
		}

		function sendLeaveBeacon(player, name) {
			if (!isValidPlayer(player) || !name) {
				return;
			}
			if (typeof navigator.sendBeacon !== "function") {
				return;
			}
			const payload = JSON.stringify({
				player: player,
				name: name
			});
			const blob = new Blob([payload], { type: "application/json" });
			navigator.sendBeacon(buildApiUrl("/api/buzzer-leave"), blob);
		}

		function releasePreviousIdentityIfAny() {
			const oldPlayer = Number(localStorage.getItem(getStorageKey("player")));
			const oldName = safeName(localStorage.getItem(getStorageKey("name")));
			sendLeaveBeacon(oldPlayer, oldName);
			clearStoredIdentity();
		}

		async function fetchJson(url, options) {
			const response = await fetch(buildApiUrl(url), options || {});
			let data = null;
			try {
				data = await response.json();
			} catch (err) {
				data = null;
			}
			if (!response.ok) {
				const errorText = data && data.error ? String(data.error) : "HTTP " + response.status;
				throw new Error(errorText);
			}
			return data || {};
		}

		async function joinGame() {
			const name = safeName(nickInput.value);
			if (!name) {
				setStatus("Wpisz ksywke.");
				return;
			}
			const password = String(passwordInput.value || "");
			joinBtn.disabled = true;
			try {
				const data = await fetchJson("/api/buzzer-join-auto", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						name: name,
						password: password
					})
				});
				const player = Number(data.player);
				if (!isValidPlayer(player)) {
					setStatus("Blad przydzialu gracza.");
					joinBtn.disabled = false;
					return;
				}
				// Najwazniejsze: zapisujemy ksywe i przydzial gracza przed przejsciem do glownej strony gry.
				localStorage.setItem(getStorageKey("name"), name);
				localStorage.setItem(getStorageKey("player"), String(player));
				goToGame();
			} catch (err) {
				if (String(err && err.message).indexOf("Invalid admin password") !== -1) {
					setStatus("Bledne haslo dla sobik.");
				} else {
					setStatus("Blad polaczenia z serwerem.");
				}
				joinBtn.disabled = false;
			}
		}

		joinBtn.addEventListener("click", joinGame);
		nickInput.addEventListener("input", updatePasswordUi);
		nickInput.addEventListener("keydown", (event) => {
			if (event.key === "Enter") {
				joinGame();
			}
		});
		passwordInput.addEventListener("keydown", (event) => {
			if (event.key === "Enter") {
				joinGame();
			}
		});

		{
			releasePreviousIdentityIfAny();
			updatePasswordUi();
		}
	</script>
</body>
</html>
