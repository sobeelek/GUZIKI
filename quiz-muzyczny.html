<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Quiz muzyczny Deezer</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111827;
			color: #f9fafb;
		}

		.app-layout {
			width: min(1640px, 98vw);
			display: grid;
			grid-template-columns: minmax(0, 1fr) 340px;
			gap: 24px;
			align-items: start;
		}

		.panel,
		.score-panel {
			padding: 22px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
		}

		.score-panel {
			position: sticky;
			top: 12px;
			display: grid;
			gap: 10px;
		}

		h1 {
			margin: 0 0 6px;
			font-size: 28px;
		}

		.info {
			margin: 0 0 14px;
			color: #d1d5db;
		}

		.me {
			margin: 0;
			color: #9ca3af;
		}

		.section {
			background: #111827;
			border: 1px solid #374151;
			border-radius: 12px;
			padding: 10px;
			display: grid;
			gap: 8px;
		}

		input[type="text"],
		input[type="range"] {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 10px 12px;
			font-size: 15px;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 12px 14px;
			font-size: 15px;
			font-weight: 700;
			background: #374151;
			color: #fff;
			cursor: pointer;
		}

		button.main {
			background: #2563eb;
		}

		button.good {
			background: #059669;
		}

		button.bad {
			background: #dc2626;
		}

		button[disabled] {
			opacity: 0.5;
			cursor: not-allowed;
		}

		select {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 10px 12px;
			font-size: 15px;
		}

		.phase-actions,
		.score-actions,
		.bottom-actions {
			display: grid;
			gap: 8px;
		}

		.phase-actions {
			grid-template-columns: repeat(4, 1fr);
		}

		.score-actions {
			grid-template-columns: 1fr 1fr;
		}

		.bottom-actions {
			grid-template-columns: 1fr 1fr;
		}

		.result {
			min-height: 32px;
			font-size: 24px;
			font-weight: 700;
			margin: 0;
		}

		.status,
		.quiz-state {
			margin: 0;
			font-size: 13px;
			color: #9ca3af;
		}

		.hidden {
			display: none;
		}

		.scoreboard {
			border: 1px solid #374151;
			border-radius: 12px;
			overflow: hidden;
		}

		.score-row {
			display: grid;
			grid-template-columns: 1fr auto;
			padding: 8px 10px;
			gap: 8px;
			background: #0f172a;
			border-bottom: 1px solid #1f2937;
		}

		.score-row:last-child {
			border-bottom: 0;
		}

		.score-row.me-row {
			background: #172554;
		}

		.score-row.guessed-row {
			background: #14532d;
		}

		@media (max-width: 960px) {
			.app-layout {
				grid-template-columns: 1fr;
			}
			.score-panel {
				position: static;
			}
			.phase-actions {
				grid-template-columns: 1fr 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="app-layout">
		<div class="panel">
			<h1>Quiz muzyczny Deezer</h1>
			<p class="info">Fazy: 1s -> 3s -> 8s -> 16s. Sobik wybiera tylko typ muzyki (zapytanie Deezer); kazda runda to losowy utwor z tej puli.</p>
			<p class="me" id="meInfo"></p>
			<p id="musicTypeLine" class="quiz-state">Typ muzyki: laczenie...</p>
			<p id="sobikRoundTrack" class="quiz-state hidden"></p>

			<div id="adminMusicSetup" class="section hidden">
				<label for="musicPreset">Typ muzyki (Deezer)</label>
				<select id="musicPreset"></select>
				<div id="customMusicWrap" class="hidden">
					<input id="customMusicInput" type="text" placeholder="Wpisz zapytanie do Deezer" />
				</div>
				<button id="saveMusicTypeBtn" class="main">Zapisz typ</button>
			</div>
			<div id="adminRoundControls" class="phase-actions hidden">
				<button id="startRoundBtn">Start 1s</button>
				<button id="nextPhaseBtn">Nastepna faza</button>
				<button id="autoToggleBtn">Auto: ON</button>
				<button id="stopClipBtn">Stop klipu</button>
			</div>

			<div class="section">
				<p id="quizPlaybackInfo" class="quiz-state">Czekam na komende odtworzenia fragmentu...</p>
				<div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;">
					<span>Glosnosc</span>
					<input id="volumeRange" type="range" min="0" max="100" step="1" value="100" />
					<span id="volumeLabel">100%</span>
				</div>
			</div>

			<button id="buzzerBtn" class="main" style="font-size:40px;padding:26px 10px;">KLIK</button>
			<button id="readyBtn">Gotowy: NIE</button>
			<button id="guessBtn" class="main">Zgadlem</button>
			<p id="result" class="result">Czekam na pierwszy klik...</p>

			<div class="bottom-actions">
				<button id="resetBtn">Reset rundy</button>
				<button id="changeBtn">Zmien gracza</button>
			</div>
			<p id="status" class="status">Status: laczenie...</p>
		</div>

		<aside class="score-panel">
			<p id="myScore" style="margin:0;font-size:18px;font-weight:700;">Twoje punkty: 0</p>
			<div id="scoreboard" class="scoreboard"></div>
		</aside>
	</div>

	<audio id="quizAudio" preload="auto"></audio>

	<script>
		const API_BASE_URL = window.API_BASE_URL || window.location.origin;
		const VIDEO_CONTROLLER_NAME = "sobik";
		const MAX_PLAYERS = 8;
		const AUTO_PHASE_DELAY_MS = 700;
		const meInfo = document.getElementById("meInfo");
		const musicTypeLine = document.getElementById("musicTypeLine");
		const sobikRoundTrack = document.getElementById("sobikRoundTrack");
		const adminMusicSetup = document.getElementById("adminMusicSetup");
		const adminRoundControls = document.getElementById("adminRoundControls");
		const musicPreset = document.getElementById("musicPreset");
		const customMusicWrap = document.getElementById("customMusicWrap");
		const customMusicInput = document.getElementById("customMusicInput");
		const saveMusicTypeBtn = document.getElementById("saveMusicTypeBtn");
		const startRoundBtn = document.getElementById("startRoundBtn");
		const nextPhaseBtn = document.getElementById("nextPhaseBtn");
		const autoToggleBtn = document.getElementById("autoToggleBtn");
		const stopClipBtn = document.getElementById("stopClipBtn");
		const volumeRange = document.getElementById("volumeRange");
		const volumeLabel = document.getElementById("volumeLabel");
		const quizPlaybackInfo = document.getElementById("quizPlaybackInfo");
		const buzzerBtn = document.getElementById("buzzerBtn");
		const readyBtn = document.getElementById("readyBtn");
		const guessBtn = document.getElementById("guessBtn");
		const result = document.getElementById("result");
		const resetBtn = document.getElementById("resetBtn");
		const changeBtn = document.getElementById("changeBtn");
		const statusEl = document.getElementById("status");
		const myScore = document.getElementById("myScore");
		const scoreboard = document.getElementById("scoreboard");
		const quizAudio = document.getElementById("quizAudio");

		let myPlayer = null;
		let myName = "";
		let currentState = null;
		let pollTimer = null;
		let currentScores = {};
		let currentPlayerNames = {};
		let currentGuessed = {};
		let localVolume = 100;
		let lastQuizCommandToken = 0;
		let clipStopTimer = null;
		let autoAdvanceEnabled = true;
		let autoAdvanceTimer = null;
		let myReady = false;

		const MUSIC_PRESETS = [
			{ value: "polski hip hop", label: "Polski hip hop" },
			{ value: "polska muzyka", label: "Polska muzyka" },
			{ value: "rock", label: "Rock" },
			{ value: "pop", label: "Pop" },
			{ value: "metal", label: "Metal" },
			{ value: "jazz", label: "Jazz" },
			{ value: "electronic dance", label: "Electronic / dance" },
			{ value: "hip hop", label: "Hip hop (ogolnie)" },
			{ value: "classical", label: "Muzyka klasyczna" },
			{ value: "__custom__", label: "Wlasne zapytanie" }
		];

		function getStorageKey(prefix) { return "buzzer_" + prefix; }
		function isValidPlayer(player) { return Number.isInteger(player) && player >= 1 && player <= MAX_PLAYERS; }
		function safeName(value, fallbackPlayer) {
			const text = String(value || "").trim();
			if (text) { return text.slice(0, 20); }
			return "Gracz " + fallbackPlayer;
		}
		function buildApiUrl(path) { return String(API_BASE_URL || "").replace(/\/+$/, "") + path; }
		function normalizeName(value) { return String(value || "").trim().toLowerCase(); }
		function isAdmin() { return normalizeName(myName) === VIDEO_CONTROLLER_NAME; }
		function setStatus(text) { statusEl.textContent = "Status: " + text; }
		function toIntScore(value) { const n = Number(value); return Number.isFinite(n) ? Math.trunc(n) : 0; }
		function clampVolume(value) { const n = Number(value); if (!Number.isFinite(n)) { return 100; } return Math.max(0, Math.min(100, Math.round(n))); }
		function goToNickChoice() { window.location.href = "wybor-ksywy.html"; }
		function goToModeChoice() { window.location.href = "wybor-trybu.html"; }
		function getVolumeStorageKey() { return getStorageKey("quiz_volume"); }

		function updateAdminUi() {
			adminMusicSetup.classList.toggle("hidden", !isAdmin());
			adminRoundControls.classList.toggle("hidden", !isAdmin());
			autoToggleBtn.textContent = autoAdvanceEnabled ? "Auto: ON" : "Auto: OFF";
		}

		function buildMusicPresetSelect() {
			const opts = MUSIC_PRESETS.map((p) => {
				return '<option value="' + String(p.value).replace(/"/g, "&quot;") + '">' + p.label + "</option>";
			});
			musicPreset.innerHTML = opts.join("");
		}

		function syncMusicControlsFromQuery(queryText) {
			const q = String(queryText || "").trim();
			let matched = false;
			for (let i = 0; i < MUSIC_PRESETS.length; i = i + 1) {
				const p = MUSIC_PRESETS[i];
				if (p.value !== "__custom__" && p.value === q) {
					musicPreset.value = p.value;
					matched = true;
					break;
				}
			}
			if (matched) {
				customMusicWrap.classList.add("hidden");
				return;
			}
			musicPreset.value = "__custom__";
			customMusicInput.value = q;
			customMusicWrap.classList.remove("hidden");
		}

		function readMusicQueryFromUi() {
			if (musicPreset.value === "__custom__") {
				return String(customMusicInput.value || "").trim();
			}
			return String(musicPreset.value || "").trim();
		}

		async function saveMusicType() {
			if (!isAdmin()) {
				return;
			}
			const query = readMusicQueryFromUi();
			if (!query) {
				setStatus("wpisz typ muzyki");
				return;
			}
			try {
				const data = await fetchJson("/api/quiz-music-type", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ name: myName, query: query })
				});
				updateByState(data.state);
				setStatus("zapisano typ muzyki");
			} catch (err) {
				setStatus("blad zapisu typu");
			}
		}

		function updateReadyUi() {
			readyBtn.textContent = myReady ? "Gotowy: TAK" : "Gotowy: NIE";
		}

		function isPlayerGuessed(player) {
			return Boolean(currentGuessed[String(player)]);
		}

		function renderScoreboard() {
			const rows = [];
			for (let i = 1; i <= MAX_PLAYERS; i = i + 1) {
				const key = String(i);
				const label = currentPlayerNames[key] ? String(currentPlayerNames[key]) : "Gracz " + i;
				const score = toIntScore(currentScores[key]);
				let rowClass = "score-row";
				if (i === myPlayer) {
					rowClass = rowClass + " me-row";
				}
				if (isPlayerGuessed(i)) {
					rowClass = rowClass + " guessed-row";
				}
				rows.push('<div class="' + rowClass + '"><span>' + label + ' (P' + i + ')</span><span>' + score + "</span></div>");
			}
			scoreboard.innerHTML = rows.join("");
			const points = toIntScore(currentScores[String(myPlayer)]);
			myScore.textContent = "Twoje punkty: " + points;
		}

		function applyVolume() {
			quizAudio.volume = localVolume / 100;
			volumeLabel.textContent = String(localVolume) + "%";
		}

		function loadVolume() {
			localVolume = clampVolume(localStorage.getItem(getVolumeStorageKey()));
			volumeRange.value = String(localVolume);
			applyVolume();
		}

		async function fetchJson(path, options) {
			const response = await fetch(buildApiUrl(path), options || {});
			let data = null;
			try { data = await response.json(); } catch (err) { data = null; }
			if (!response.ok) {
				const text = data && data.error ? String(data.error) : "HTTP " + response.status;
				throw new Error(text);
			}
			return data || {};
		}

		function stopCurrentClip() {
			if (clipStopTimer) {
				clearTimeout(clipStopTimer);
				clipStopTimer = null;
			}
			quizAudio.pause();
			try { quizAudio.currentTime = 0; } catch (err) { return; }
		}

		async function playQuizClipFromState(state) {
			const previewUrl = String(state.quizPreviewUrl || "").trim();
			const durationSec = Number(state.quizCommandDurationSec || 0);
			if (!previewUrl || durationSec <= 0) {
				return;
			}
			if (isPlayerGuessed(myPlayer)) {
				return;
			}
			stopCurrentClip();
			if (quizAudio.src !== previewUrl) {
				quizAudio.src = previewUrl;
			}
			applyVolume();
			try {
				quizAudio.currentTime = 0;
				await quizAudio.play();
				clipStopTimer = setTimeout(() => {
					stopCurrentClip();
				}, durationSec * 1000);
			} catch (err) {
				setStatus("nie mozna odtworzyc fragmentu");
			}
		}

		function clearAutoAdvanceTimer() {
			if (!autoAdvanceTimer) {
				return;
			}
			clearTimeout(autoAdvanceTimer);
			autoAdvanceTimer = null;
		}

		async function requestNextPhase() {
			if (!isAdmin()) {
				return;
			}
			try {
				const data = await fetchJson("/api/quiz-next-phase", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ name: myName })
				});
				updateByState(data.state);
			} catch (err) {
				return;
			}
		}

		function scheduleAutoAdvanceIfNeeded(state) {
			clearAutoAdvanceTimer();
			if (!isAdmin() || !autoAdvanceEnabled) {
				return;
			}
			const roundActive = Boolean(state.quizRoundActive);
			const guessedCount = Number(state.quizGuessedCount || 0);
			const occupiedCount = Number(state.quizOccupiedCount || 0);
			const phaseIndex = Number(state.quizPhaseIndex || -1);
			const durations = Array.isArray(state.quizPhaseDurations) ? state.quizPhaseDurations : [1, 3, 8, 16];
			const maxIndex = durations.length - 1;
			if (!roundActive || phaseIndex < 0 || phaseIndex >= maxIndex) {
				return;
			}
			if (occupiedCount > 0 && guessedCount >= occupiedCount) {
				return;
			}
			const currentDuration = Number(state.quizCommandDurationSec || 0);
			const delay = Math.max(400, currentDuration * 1000 + AUTO_PHASE_DELAY_MS);
			autoAdvanceTimer = setTimeout(() => {
				requestNextPhase();
			}, delay);
		}

		function updateByState(state) {
			currentState = state;
			currentScores = state.scores || {};
			currentPlayerNames = state.playerNames || {};
			currentGuessed = state.quizGuessedPlayers || {};
			const readyPlayers = state.quizReadyPlayers || {};
			myReady = Boolean(readyPlayers[String(myPlayer)]);
			const winner = state.winner;
			const winnerName = state.winnerName || ("Gracz " + winner);
			const winnerTime = state.winnerTimeMs;
			if (winner === null) {
				result.textContent = "Czekam na pierwszy klik...";
				buzzerBtn.disabled = false;
			} else {
				result.textContent = winnerName + " kliknal(a) pierwszy! Czas: " + winnerTime + " ms";
				buzzerBtn.disabled = true;
			}
			guessBtn.disabled = isPlayerGuessed(myPlayer) || !Boolean(state.quizRoundActive);
			updateReadyUi();
			const mq = String(state.quizMusicQuery || "").trim();
			musicTypeLine.textContent = "Typ muzyki (losowo z Deezer): " + (mq || "(brak)");
			if (isAdmin()) {
				syncMusicControlsFromQuery(mq);
			}
			const roundOn = Boolean(state.quizRoundActive);
			const selectedLabel = String(state.quizTrackLabel || "").trim();
			if (isAdmin() && roundOn && selectedLabel) {
				sobikRoundTrack.textContent = "Podglad (sobik): teraz gra — " + selectedLabel;
				sobikRoundTrack.classList.remove("hidden");
			} else {
				sobikRoundTrack.textContent = "";
				sobikRoundTrack.classList.add("hidden");
			}
			const phaseIndex = Number(state.quizPhaseIndex || -1);
			const phaseDuration = Number(state.quizCommandDurationSec || 0);
			const phasePoints = Array.isArray(state.quizPhasePoints) ? state.quizPhasePoints : [5, 3, 2, 1];
			const readyCount = Number(state.quizReadyCount || 0);
			const occupiedCount = Number(state.quizOccupiedCount || 0);
			if (phaseIndex >= 0) {
				const points = phaseIndex >= 0 && phaseIndex < phasePoints.length ? phasePoints[phaseIndex] : 0;
				quizPlaybackInfo.textContent = "Faza " + (phaseIndex + 1) + ": " + phaseDuration + "s (" + points + " pkt), gotowi " + readyCount + "/" + occupiedCount;
			} else {
				quizPlaybackInfo.textContent = "Czekam na start sobik... gotowi " + readyCount + "/" + occupiedCount;
			}
			const token = Number(state.quizCommandToken || 0);
			if (token > lastQuizCommandToken) {
				lastQuizCommandToken = token;
				playQuizClipFromState(state);
			}
			scheduleAutoAdvanceIfNeeded(state);
			updateAdminUi();
			renderScoreboard();
		}

		async function refreshState() {
			try {
				const state = await fetchJson("/api/buzzer-state");
				updateByState(state);
				setStatus("online");
			} catch (err) {
				setStatus("brak polaczenia z serwerem");
			}
		}

		async function clickBuzzer() {
			if (!myPlayer) { return; }
			if (currentState && currentState.winner !== null) { return; }
			buzzerBtn.disabled = true;
			try {
				const data = await fetchJson("/api/buzzer-click", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ player: myPlayer, name: myName })
				});
				updateByState(data.state);
				setStatus("online");
			} catch (err) {
				buzzerBtn.disabled = false;
				setStatus("blad klikniecia");
			}
		}

		async function markGuess() {
			if (!myPlayer || isPlayerGuessed(myPlayer)) {
				return;
			}
			try {
				const data = await fetchJson("/api/quiz-guess", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ player: myPlayer, name: myName })
				});
				updateByState(data.state);
				setStatus("zaznaczono zgadniecie");
			} catch (err) {
				setStatus("blad zaznaczenia zgadniecia");
			}
		}

		async function resetRound() {
			try {
				const data = await fetchJson("/api/buzzer-reset", { method: "POST" });
				updateByState(data.state);
				setStatus("online");
			} catch (err) {
				setStatus("blad resetu");
			}
		}

		async function startQuizRound() {
			if (!isAdmin()) { return; }
			try {
				const data = await fetchJson("/api/quiz-start-round", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ name: myName })
				});
				updateByState(data.state);
				setStatus("start rundy 1s");
			} catch (err) {
				setStatus("blad startu rundy");
			}
		}

		async function setReady(readyValue) {
			try {
				const data = await fetchJson("/api/quiz-ready", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({
						player: myPlayer,
						name: myName,
						ready: readyValue
					})
				});
				updateByState(data.state);
				setStatus(readyValue ? "jestes gotowy" : "usunieto gotowosc");
			} catch (err) {
				setStatus("blad ustawiania gotowosci");
			}
		}

		function sendLeaveBeacon() {
			if (!isValidPlayer(myPlayer) || !myName || typeof navigator.sendBeacon !== "function") {
				return;
			}
			const payload = JSON.stringify({ player: myPlayer, name: myName });
			const blob = new Blob([payload], { type: "application/json" });
			navigator.sendBeacon(buildApiUrl("/api/buzzer-leave"), blob);
		}

		async function leaveAndGoModeChoice() {
			sendLeaveBeacon();
			localStorage.removeItem(getStorageKey("player"));
			localStorage.removeItem(getStorageKey("name"));
			goToModeChoice();
		}

		function startPolling() {
			if (pollTimer) { clearInterval(pollTimer); }
			pollTimer = setInterval(refreshState, 350);
		}

		{
			const storedPlayer = Number(localStorage.getItem(getStorageKey("player")));
			const storedName = String(localStorage.getItem(getStorageKey("name")) || "").trim();
			if (!isValidPlayer(storedPlayer) || !storedName) {
				goToNickChoice();
			} else {
				myPlayer = storedPlayer;
				myName = safeName(storedName, storedPlayer);
				meInfo.textContent = "Jestes: " + myName + " (gracz " + myPlayer + ")";
				loadVolume();
				buildMusicPresetSelect();
				updateAdminUi();
				updateReadyUi();
				startPolling();
				refreshState();
			}
		}

		musicPreset.addEventListener("change", () => {
			if (musicPreset.value === "__custom__") {
				customMusicWrap.classList.remove("hidden");
			} else {
				customMusicWrap.classList.add("hidden");
			}
		});
		saveMusicTypeBtn.addEventListener("click", saveMusicType);
		startRoundBtn.addEventListener("click", startQuizRound);
		nextPhaseBtn.addEventListener("click", requestNextPhase);
		autoToggleBtn.addEventListener("click", () => {
			autoAdvanceEnabled = !autoAdvanceEnabled;
			updateAdminUi();
			if (currentState) {
				scheduleAutoAdvanceIfNeeded(currentState);
			}
		});
		stopClipBtn.addEventListener("click", stopCurrentClip);
		volumeRange.addEventListener("input", () => {
			localVolume = clampVolume(volumeRange.value);
			volumeRange.value = String(localVolume);
			localStorage.setItem(getVolumeStorageKey(), String(localVolume));
			applyVolume();
		});
		buzzerBtn.addEventListener("click", clickBuzzer);
		readyBtn.addEventListener("click", () => {
			setReady(!myReady);
		});
		guessBtn.addEventListener("click", markGuess);
		resetBtn.addEventListener("click", resetRound);
		changeBtn.addEventListener("click", leaveAndGoModeChoice);
		window.addEventListener("pagehide", sendLeaveBeacon);
	</script>
</body>
</html>
