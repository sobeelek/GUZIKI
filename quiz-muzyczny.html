<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="data:," />
	<title>Quiz muzyczny</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111827;
			color: #f9fafb;
		}

		.app-layout {
			width: min(1640px, 98vw);
			display: grid;
			grid-template-columns: minmax(0, 1fr) 340px;
			gap: 24px;
			align-items: start;
		}

		.panel,
		.score-panel {
			padding: 22px;
			border-radius: 16px;
			background: #1f2937;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
		}

		.score-panel {
			position: sticky;
			top: 12px;
			display: grid;
			gap: 10px;
		}

		h1 {
			margin: 0 0 6px;
			font-size: 28px;
		}

		.me {
			margin: 0;
			color: #9ca3af;
		}

		.section {
			background: #111827;
			border: 1px solid #374151;
			border-radius: 12px;
			padding: 10px;
			display: grid;
			gap: 8px;
		}

		input[type="text"],
		input[type="range"] {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 10px 12px;
			font-size: 15px;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 12px 14px;
			font-size: 15px;
			font-weight: 700;
			background: #374151;
			color: #fff;
			cursor: pointer;
		}

		button.main {
			background: #2563eb;
		}

		button.good {
			background: #059669;
		}

		button.bad {
			background: #dc2626;
		}

		button[disabled] {
			opacity: 0.5;
			cursor: not-allowed;
		}

		select {
			border: 1px solid #374151;
			border-radius: 10px;
			background: #0b1220;
			color: #f9fafb;
			padding: 10px 12px;
			font-size: 15px;
		}

		.phase-actions,
		.score-actions {
			display: grid;
			gap: 8px;
		}

		.phase-actions {
			grid-template-columns: repeat(4, 1fr);
		}

		.score-actions {
			grid-template-columns: 1fr 1fr;
		}

		.result {
			min-height: 32px;
			font-size: 24px;
			font-weight: 700;
			margin: 0;
		}

		.result.bad {
			color: #f87171;
		}

		.wrong-guess-panel {
			margin: 10px 0 0;
			padding: 12px 14px;
			border-radius: 12px;
			border: 2px solid #dc2626;
			background: #450a0a;
			color: #fecaca;
			font-size: 15px;
			line-height: 1.45;
		}

		.wrong-guess-panel strong {
			display: block;
			margin-bottom: 8px;
			color: #fecaca;
		}

		.wrong-guess-panel ul {
			margin: 0;
			padding-left: 1.2em;
		}

		.wrong-guess-panel li {
			margin: 4px 0;
			word-break: break-word;
		}

		.guess-history-panel {
			margin: 10px 0 0;
			padding: 10px 12px;
			border-radius: 12px;
			border: 1px solid #4b5563;
			background: #0f172a;
			font-size: 14px;
			line-height: 1.45;
			color: #e5e7eb;
		}

		.guess-history-panel--below-actions {
			margin-top: 14px;
		}

		.guess-history-panel ol {
			margin: 0;
			padding-left: 1.35em;
		}

		.guess-history-panel li {
			margin: 4px 0;
			word-break: break-word;
		}

		.guess-hist-item {
			list-style-position: outside;
			padding: 10px 10px 10px 12px;
			border-left: 4px solid #4b5563;
			border-radius: 10px;
			margin: 8px 0;
		}

		.guess-hist-item--artist_hint {
			border-left-color: #eab308;
			background: rgba(234, 179, 8, 0.12);
		}

		.guess-hist-item--wrong {
			border-left-color: #dc2626;
			background: rgba(220, 38, 38, 0.12);
		}

		.guess-hist-item--correct {
			border-left-color: #22c55e;
			background: rgba(34, 197, 94, 0.14);
		}

		.guess-hist-item--skip {
			border-left-color: #64748b;
			background: rgba(100, 116, 139, 0.18);
		}

		.guess-hist-line {
			margin: 2px 0;
			font-size: 14px;
		}

		.guess-hist-lbl {
			display: inline-block;
			min-width: 4.5em;
			color: #9ca3af;
			font-size: 12px;
			font-weight: 600;
		}

		.guess-hist-plain {
			font-size: 14px;
		}

		.status,
		.quiz-state {
			margin: 0;
			font-size: 13px;
			color: #9ca3af;
		}

		.hidden {
			display: none;
		}

		.scoreboard {
			border: 1px solid #374151;
			border-radius: 12px;
			overflow: hidden;
		}

		.score-row {
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			padding: 8px 10px;
			gap: 8px;
			background: #0f172a;
			border-bottom: 1px solid #1f2937;
		}

		.sb-ava {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			overflow: hidden;
			flex-shrink: 0;
			background: #334155;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 14px;
			font-weight: 800;
			color: #e2e8f0;
		}

		.sb-avatar-img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.score-name-cell {
			min-width: 0;
			word-break: break-word;
		}

		.score-row:last-child {
			border-bottom: 0;
		}

		.score-row.me-row {
			background: #172554;
		}

		.score-row.guessed-row {
			background: #14532d;
		}

		.score-row.artist-hint-row {
			background: #713f12;
		}

		.score-row.wrong-row {
			background: #450a0a;
		}

		.guess-autocomplete-wrap {
			position: relative;
			width: 100%;
			margin-top: 4px;
		}

		.guess-suggest {
			list-style: none;
			margin: 0;
			padding: 4px 0;
			position: absolute;
			left: 0;
			right: 0;
			top: 100%;
			z-index: 20;
			max-height: 220px;
			overflow: auto;
			background: #0b1220;
			border: 1px solid #4b5563;
			border-radius: 10px;
			box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
		}

		.guess-suggest li {
			margin: 0;
			padding: 0;
		}

		.guess-suggest-item {
			width: 100%;
			border: 0;
			border-radius: 0;
			background: transparent;
			text-align: left;
			padding: 10px 12px;
			font-size: 14px;
			color: #e5e7eb;
			cursor: pointer;
			font-weight: 600;
		}

		.guess-suggest-item:hover {
			background: #1f2937;
		}

		.guess-row--with-skip {
			display: grid;
			grid-template-columns: 1fr auto auto;
			gap: 10px;
			align-items: stretch;
		}

		.guess-row--with-skip input {
			width: 100%;
			box-sizing: border-box;
		}

		.skip-phase-btn {
			min-width: 76px;
			padding: 10px 14px;
			font-weight: 700;
			border-radius: 10px;
			border: 1px solid #4b5563;
			background: #1f2937;
			color: #e5e7eb;
			cursor: pointer;
		}

		.skip-phase-btn:disabled {
			opacity: 0.45;
			cursor: not-allowed;
		}

		.guess-form {
			margin: 0;
		}

		.quiz-phase-badge {
			margin: 8px 0 6px;
			font-size: 14px;
			font-weight: 600;
			color: #93c5fd;
		}

		.reveal-panel {
			border: 2px solid #22c55e;
			border-radius: 12px;
			padding: 14px;
			background: #052e16;
			font-size: 18px;
			font-weight: 700;
			text-align: center;
			color: #ecfdf5;
		}

		.reveal-panel .reveal-title-line {
			font-size: 24px;
			font-weight: 800;
			line-height: 1.25;
			color: #ecfdf5;
			word-break: break-word;
		}

		.reveal-panel .reveal-artist-line {
			margin-top: 8px;
			font-size: 17px;
			font-weight: 600;
			color: #bbf7d0;
		}

		.quiz-progress-wrap {
			margin-top: 6px;
			display: grid;
			gap: 6px;
		}

		.quiz-progress-label {
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: #64748b;
		}

		.quiz-progress-wrap--playing .quiz-progress-label {
			color: #7dd3fc;
		}

		.quiz-progress-track {
			height: 14px;
			border-radius: 999px;
			background: #020617;
			border: 1px solid #334155;
			overflow: hidden;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.quiz-progress-wrap--playing .quiz-progress-track {
			height: 20px;
			border: 2px solid #38bdf8;
			box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35), 0 4px 24px rgba(37, 99, 235, 0.35);
		}

		.quiz-progress-fill {
			height: 100%;
			width: 0%;
			border-radius: 999px;
			background: linear-gradient(90deg, #1d4ed8, #38bdf8, #7dd3fc);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
		}

		.quiz-progress-wrap--playing .quiz-progress-fill {
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 0 16px rgba(56, 189, 248, 0.45);
		}

		.quiz-progress-fill.reveal {
			background: linear-gradient(90deg, #047857, #34d399, #6ee7b7);
		}

		.quiz-progress-wrap--playing .quiz-progress-fill.reveal {
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 0 14px rgba(52, 211, 153, 0.4);
		}

		.guess-input-main {
			font-size: 18px !important;
			font-weight: 600;
			padding: 16px 18px !important;
			min-height: 52px;
			border: 2px solid #3b82f6 !important;
			background: #020617 !important;
			box-shadow: 0 4px 20px rgba(37, 99, 235, 0.2);
		}

		.guess-input-main:focus {
			outline: none;
			border-color: #60a5fa !important;
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.35), 0 8px 28px rgba(37, 99, 235, 0.35);
		}

		.guess-input-main:disabled {
			opacity: 0.55;
			border-color: #475569 !important;
			box-shadow: none;
		}

		@media (max-width: 960px) {
			.app-layout {
				grid-template-columns: 1fr;
			}
			.score-panel {
				position: static;
			}
			.phase-actions {
				grid-template-columns: 1fr 1fr;
			}
		}

		.quiz-end-overlay {
			position: fixed;
			left: 0;
			top: 0;
			right: 0;
			bottom: 0;
			z-index: 2000;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
			box-sizing: border-box;
			background: rgba(15, 23, 42, 0.82);
			backdrop-filter: blur(6px);
		}

		.quiz-end-overlay.hidden {
			display: none;
		}

		.quiz-end-modal {
			width: min(520px, 100%);
			max-height: min(88vh, 640px);
			overflow: auto;
			border-radius: 18px;
			border: 2px solid #334155;
			background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%);
			box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
			padding: 22px 22px 18px;
			box-sizing: border-box;
		}

		.quiz-end-modal h2 {
			margin: 0 0 8px;
			font-size: 24px;
			font-weight: 800;
			text-align: center;
			color: #f8fafc;
		}

		.quiz-end-subtitle {
			margin: 0 0 10px;
			font-size: 14px;
			color: #94a3b8;
			text-align: center;
		}

		.quiz-end-win-line {
			margin: 0 0 16px;
			padding: 12px 14px;
			border-radius: 12px;
			background: rgba(37, 99, 235, 0.2);
			border: 1px solid #3b82f6;
			font-size: 17px;
			font-weight: 700;
			text-align: center;
			color: #e0f2fe;
			line-height: 1.35;
		}

		.quiz-end-board {
			display: grid;
			gap: 8px;
			margin-bottom: 18px;
		}

		.quiz-end-row {
			display: grid;
			grid-template-columns: 40px 48px minmax(0, 1fr) auto;
			align-items: center;
			gap: 10px;
			padding: 10px 12px;
			border-radius: 12px;
			background: #111827;
			border: 1px solid #374151;
			font-size: 15px;
			font-weight: 600;
		}

		.quiz-end-row--first {
			border-color: #eab308;
			background: rgba(234, 179, 8, 0.12);
		}

		.quiz-end-row--me {
			outline: 2px solid #38bdf8;
			outline-offset: 0;
		}

		.quiz-end-rank {
			font-weight: 800;
			color: #94a3b8;
			text-align: center;
		}

		.quiz-end-row--first .quiz-end-rank {
			color: #fbbf24;
		}

		.quiz-end-name {
			min-width: 0;
			word-break: break-word;
			color: #f1f5f9;
		}

		.quiz-end-pts {
			font-variant-numeric: tabular-nums;
			color: #a5b4fc;
			white-space: nowrap;
		}

		.quiz-end-empty {
			margin: 0;
			text-align: center;
			color: #94a3b8;
			font-size: 14px;
		}

		.quiz-end-close-wrap {
			display: flex;
			justify-content: center;
		}

	</style>
</head>
<body>
	<div class="app-layout">
		<div class="panel">
			<h1>Quiz muzyczny</h1>
			<p class="me" id="meInfo"></p>
			<div id="revealPanel" class="reveal-panel hidden"></div>

			<div id="adminRoundLimitRow" class="section hidden">
				<label for="quizRoundLimitInput">Limit utworów w sesji (0 = bez limitu)</label>
				<div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-top:6px;">
					<input id="quizRoundLimitInput" type="number" min="0" max="9999" step="1" value="0" />
					<button id="saveRoundLimitBtn" type="button" class="main">Zapisz limit</button>
				</div>
				<p id="quizRoundLimitHint" style="margin:8px 0 0;font-size:13px;color:#94a3b8;"></p>
			</div>
			<div id="adminRoundControls" class="phase-actions hidden">
				<button id="startRoundBtn">Start</button>
				<button id="nextPhaseBtn">Nastepna faza</button>
				<button id="autoToggleBtn">Auto: ON</button>
				<button id="stopClipBtn">Stop klipu</button>
			</div>

			<div class="section">
				<div id="quizProgressWrap" class="quiz-progress-wrap">
					<span class="quiz-progress-label">Postep klipu</span>
					<div class="quiz-progress-track" aria-hidden="true">
						<div id="quizProgressFill" class="quiz-progress-fill"></div>
					</div>
				</div>
				<div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;">
					<span>Glosnosc</span>
					<input id="volumeRange" type="range" min="0" max="100" step="1" value="25" />
					<span id="volumeLabel">25%</span>
				</div>
			</div>

			<p id="quizLimitBanner" class="quiz-phase-badge hidden" style="color:#fbbf24;" aria-live="polite"></p>
			<p id="quizPhaseBadge" class="quiz-phase-badge hidden" aria-live="polite"></p>
			<div class="guess-autocomplete-wrap">
				<form id="guessForm" class="guess-form" action="#" method="post">
					<div class="guess-row guess-row--with-skip">
						<input id="guessInput" class="guess-input-main" name="guess" type="text" placeholder="Artysta - tytul (Enter)" autocomplete="off" disabled />
						<button type="button" id="skipPhaseBtn" class="skip-phase-btn" disabled>
							SKIP
						</button>
						<button type="button" id="replayListenBtn" class="skip-phase-btn" disabled title="Ponownie od poczatku (tylko u Ciebie)">
							Ponów
						</button>
					</div>
				</form>
				<ul id="guessSuggestList" class="guess-suggest hidden"></ul>
			</div>
			<p id="result" class="result"></p>
			<div id="wrongGuessPanel" class="wrong-guess-panel hidden" aria-live="polite"></div>

			<div id="guessHistoryPanel" class="guess-history-panel guess-history-panel--below-actions hidden" aria-live="polite"></div>
			<p id="status" class="status">Status: laczenie...</p>
		</div>

		<aside class="score-panel">
			<p id="myScore" style="margin:0;font-size:18px;font-weight:700;">Twoje punkty: 0</p>
			<div id="scoreboard" class="scoreboard"></div>
		</aside>
	</div>

	<div id="quizEndOverlay" class="quiz-end-overlay hidden" aria-hidden="true">
		<div id="quizEndModal" class="quiz-end-modal" role="dialog" aria-modal="true" aria-labelledby="quizEndTitle">
			<h2 id="quizEndTitle">Koniec sesji quizu</h2>
			<p id="quizEndSubtitle" class="quiz-end-subtitle"></p>
			<p id="quizEndWinLine" class="quiz-end-win-line"></p>
			<div id="quizEndLeaderboard" class="quiz-end-board"></div>
			<div class="quiz-end-close-wrap">
				<button type="button" id="quizEndCloseBtn" class="main">Zamknij</button>
			</div>
		</div>
	</div>

	<audio id="quizAudio" preload="auto" playsinline></audio>

	<script>
		const API_BASE_URL = window.API_BASE_URL || window.location.origin;
		const VIDEO_CONTROLLER_NAME = "sobik";
		const MAX_PLAYERS = 8;
		const AUTO_PHASE_DELAY_MS = 700;
		const QUIZ_MAX_SKIPS = 4;
		const meInfo = document.getElementById("meInfo");
		const revealPanel = document.getElementById("revealPanel");
		const adminRoundControls = document.getElementById("adminRoundControls");
		const adminRoundLimitRow = document.getElementById("adminRoundLimitRow");
		const quizRoundLimitInput = document.getElementById("quizRoundLimitInput");
		const saveRoundLimitBtn = document.getElementById("saveRoundLimitBtn");
		const quizRoundLimitHint = document.getElementById("quizRoundLimitHint");
		const quizLimitBanner = document.getElementById("quizLimitBanner");
		const startRoundBtn = document.getElementById("startRoundBtn");
		const nextPhaseBtn = document.getElementById("nextPhaseBtn");
		const autoToggleBtn = document.getElementById("autoToggleBtn");
		const stopClipBtn = document.getElementById("stopClipBtn");
		const volumeRange = document.getElementById("volumeRange");
		const volumeLabel = document.getElementById("volumeLabel");
		const quizProgressFill = document.getElementById("quizProgressFill");
		const quizProgressWrap = document.getElementById("quizProgressWrap");
		const guessForm = document.getElementById("guessForm");
		const guessInput = document.getElementById("guessInput");
		const skipPhaseBtn = document.getElementById("skipPhaseBtn");
		const replayListenBtn = document.getElementById("replayListenBtn");
		const quizPhaseBadge = document.getElementById("quizPhaseBadge");
		const guessSuggestList = document.getElementById("guessSuggestList");
		const result = document.getElementById("result");
		const guessHistoryPanel = document.getElementById("guessHistoryPanel");
		const wrongGuessPanel = document.getElementById("wrongGuessPanel");
		const statusEl = document.getElementById("status");
		const myScore = document.getElementById("myScore");
		const scoreboard = document.getElementById("scoreboard");
		const quizEndOverlay = document.getElementById("quizEndOverlay");
		const quizEndModal = document.getElementById("quizEndModal");
		const quizEndSubtitle = document.getElementById("quizEndSubtitle");
		const quizEndWinLine = document.getElementById("quizEndWinLine");
		const quizEndLeaderboard = document.getElementById("quizEndLeaderboard");
		const quizEndCloseBtn = document.getElementById("quizEndCloseBtn");
		const quizAudio = document.getElementById("quizAudio");

		let myPlayer = null;
		let myName = "";
		let currentState = null;
		let pollTimer = null;
		let currentScores = {};
		let currentPlayerNames = {};
		let currentGuessed = {};
		let currentPlayerAvatars = {};
		let lastStateUpdateMs = 0;
		let localVolume = 25;
		let lastQuizCommandToken = 0;
		let lastQuizListenTokenMine = 0;
		let clipStopTimer = null;
		let clipProgressRaf = null;
		let clipProgressWindowStartSec = 0;
		let clipProgressWindowDurSec = 1;
		let autoAdvanceEnabled = true;
		let autoAdvanceTimer = null;
		let currentArtistHints = {};
		let currentQuizWrong = {};
		let currentQuizWrongGuesses = {};
		let currentQuizGuessHistory = {};
		let suggestDebounceTimer = null;
		let suggestHideTimer = null;
		let guessSubmitInFlight = false;
		let skipPhaseInFlight = false;
		let localReplayGen = 0;
		let quizEndOverlayDismissed = false;

		function renderScoreboard() {
			const roundOn = currentState && Boolean(currentState.quizRoundActive);

				const key = String(i);

			items.sort(function (a, b) {
				if (b.score !== a.score) {
					return b.score - a.score;
				}
				return a.i - b.i;

		function updateQuizEndOverlay(state, roundOn, revealOn, exhausted) {

		async function runDeezerSuggest() {

				if (!tracks.length) {

		async function fetchJson(path, options) {
			const response = await fetch(buildApiUrl(path), options || {});
			let data = null;
			try { data = await response.json(); } catch (err) { data = null; }
			if (!response.ok) {
				const text = data && data.error ? String(data.error) : "HTTP " + response.status;
				throw new Error(text);
			}
			return data || {};
		}

		function stopClipProgress() {
			if (clipProgressRaf !== null) {
				cancelAnimationFrame(clipProgressRaf);
				clipProgressRaf = null;
			}
			quizProgressFill.style.width = "0%";
			quizProgressFill.classList.remove("reveal");
		}

		function startClipProgress(windowStartSec, windowDurSec, isRevealPhase) {
			stopClipProgress();
			if (quizProgressWrap) {
				quizProgressWrap.classList.add("quiz-progress-wrap--playing");
			}
			clipProgressWindowStartSec = Number(windowStartSec) || 0;
			clipProgressWindowDurSec = Math.max(0.001, Number(windowDurSec) || 1);
			if (isRevealPhase) {
				quizProgressFill.classList.add("reveal");
			}
			function tick() {
				clipProgressRaf = null;
				if (!quizAudio) {
					return;
				}
				const dur = clipProgressWindowDurSec;
				let elapsed = (Number(quizAudio.currentTime) || 0) - clipProgressWindowStartSec;
				if (!Number.isFinite(elapsed)) {
					elapsed = 0;
				}
				let p = elapsed / dur;
				if (p < 0) {
					p = 0;
				}
				if (p > 1) {
					p = 1;
				}
				quizProgressFill.style.width = (p * 100) + "%";
				if (p < 1 && !quizAudio.paused) {
					clipProgressRaf = requestAnimationFrame(tick);
				}
			}
			clipProgressRaf = requestAnimationFrame(tick);
		}

		function stopCurrentClip() {
			if (clipStopTimer) {
				clearTimeout(clipStopTimer);
				clipStopTimer = null;
			}
			if (quizProgressWrap) {
				quizProgressWrap.classList.remove("quiz-progress-wrap--playing");
			}
			stopClipProgress();
			quizAudio.pause();
			try { quizAudio.currentTime = 0; } catch (err) { return; }
		}

		function normalizedAudioUrl(u) {
			const s = String(u || "").trim();
			if (!s) {
				return "";
			}
			try {
				return new URL(s, document.baseURI).href;
			} catch (err) {
				return s;
			}
		}

		function quizAudioUrlsMatch(currentRaw, nextRaw) {
			const a = normalizedAudioUrl(currentRaw);
			const b = normalizedAudioUrl(nextRaw);
			return a !== "" && b !== "" && a === b;
		}

		function waitQuizAudioCanPlay() {
			return new Promise(function (resolve, reject) {
				if (quizAudio.readyState >= 2) {
					resolve();
					return;
				}
				const onOk = function () {
					cleanup();
					resolve();
				};
				const onBad = function () {
					cleanup();
					reject(new Error("brak audio"));
				};
				function cleanup() {
					quizAudio.removeEventListener("canplay", onOk);
					quizAudio.removeEventListener("error", onBad);
				}
				quizAudio.addEventListener("canplay", onOk, { once: true });
				quizAudio.addEventListener("error", onBad, { once: true });
			});
		}

		function seekQuizAudioToStart() {
			// Najważniejsze: kazda faza zgadywania i kazda nowa piosenka — zawsze od początku pliku preview (nie od srodka).
			return new Promise(function (resolve) {
				let settled = false;
				function fin() {
					if (settled) {
						return;
					}
					settled = true;
					try {
						quizAudio.removeEventListener("seeked", fin);
					} catch (e0) {}
					resolve();
				}
				try {
					quizAudio.pause();
				} catch (e1) {}
				try {
					if (typeof quizAudio.fastSeek === "function") {
						try {
							quizAudio.fastSeek(0);
						} catch (e2) {
							quizAudio.currentTime = 0;
						}
					} else {
						quizAudio.currentTime = 0;
					}
				} catch (e3) {
					fin();
					return;
				}
				quizAudio.addEventListener("seeked", fin, { once: true });
				window.setTimeout(fin, 120);
			});
		}

		function resolveQuizListenDurationForMe(state) {
			const previewUrl = String(state.quizPreviewUrl || "").trim();
			if (!previewUrl) {
				return 0;
			}
			const reveal = Boolean(state.quizRevealActive);
			const seekMiddle = Boolean(state.quizRevealSeekMiddle);
			let durationSec = Number(state.quizCommandDurationSec || 0);
			if (!reveal && !seekMiddle) {
				if (isPlayerGuessed(myPlayer)) {
					return 0;
				}
				if (isQuizWrong(myPlayer)) {
					return 0;
				}
				const durs = Array.isArray(state.quizPhaseDurations) ? state.quizPhaseDurations : [0.5, 2, 4, 6];
				const lpMap = state.quizListenPhases || {};
				let idx = Number(lpMap[String(myPlayer)]);
				if (!Number.isFinite(idx)) {
					idx = 0;
				}
				idx = Math.max(0, Math.min(Math.floor(idx), durs.length - 1));
				const tier = Number(durs[idx]);
				if (Number.isFinite(tier) && tier > 0) {
					durationSec = tier;
				}
			}
			return durationSec > 0 ? durationSec : 0;
		}

		async function replayLocalQuizClip() {
			const state = currentState;
			const dur = resolveQuizListenDurationForMe(state);
			if (dur <= 0) {
				return;
			}
			localReplayGen = localReplayGen + 1;
			const gen = localReplayGen;
			applyVolume();
			try {
				await seekQuizAudioToStart();
				if (gen !== localReplayGen) {
					return;
				}
				await quizAudio.play();
				startClipProgress(0, dur, false);
				if (clipStopTimer) {
					clearTimeout(clipStopTimer);
				}
				clipStopTimer = setTimeout(function () {
					stopCurrentClip();
				}, dur * 1000);
			} catch (err0) {
				setStatus("nie mozna odtworzyc ponownie");
			}
		}

		async function playQuizClipFromState(state) {
			const previewUrl = String(state.quizPreviewUrl || "").trim();
			const reveal = Boolean(state.quizRevealActive);
			if (!previewUrl) {
				return;
			}
			const durationSec = resolveQuizListenDurationForMe(state);
			if (durationSec <= 0) {
				return;
			}
			stopCurrentClip();
			const curSrc = quizAudio.currentSrc || quizAudio.src || "";
			if (!quizAudioUrlsMatch(curSrc, previewUrl)) {
				quizAudio.src = previewUrl;
				try {
					quizAudio.load();
				} catch (errLoad) {
					return;
				}
				try {
					await waitQuizAudioCanPlay();
				} catch (errWait) {
					const msg = errWait && errWait.message ? String(errWait.message) : "blad ladowania audio";
					setStatus(msg);
					return;
				}
			}
			applyVolume();
			try {
				// Najważniejsze: zawsze od początku próbki (bez „końcówki/refrenu”).
				await seekQuizAudioToStart();
				await quizAudio.play();
				startClipProgress(0, durationSec, Boolean(reveal));
				clipStopTimer = setTimeout(() => {
					stopCurrentClip();
				}, durationSec * 1000);
			} catch (err) {
				setStatus("nie mozna odtworzyc fragmentu (autoplay lub format)");
			}
		}

		function clearAutoAdvanceTimer() {
			if (!autoAdvanceTimer) {
				return;
			}
			clearTimeout(autoAdvanceTimer);
			autoAdvanceTimer = null;
		}

		async function requestNextPhase() {
			if (!isAdmin()) {
				return;
			}
			try {
				const data = await fetchJson("/api/quiz-next-phase", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ name: myName })
				});
				updateByState(data.state);
			} catch (err) {
				return;
			}
		}

		function scheduleAutoAdvanceIfNeeded(state) {
			clearAutoAdvanceTimer();
			if (!isAdmin() || !autoAdvanceEnabled) {
				return;
			}
			const roundActive = Boolean(state.quizRoundActive);
			const revealOn = Boolean(state.quizRevealActive);
			const finishedCount = Number(state.quizFinishedCount || 0);
			const occupiedCount = Number(state.quizOccupiedCount || 0);
			const phaseIndex = Number(state.quizPhaseIndex || -1);
			if (!roundActive || revealOn || phaseIndex < 0) {
				return;
			}
			if (occupiedCount > 0 && finishedCount >= occupiedCount) {
				return;
			}
			const currentDuration = Number(state.quizCommandDurationSec || 0);
			const delay = Math.max(400, currentDuration * 1000 + AUTO_PHASE_DELAY_MS);
			autoAdvanceTimer = setTimeout(() => {
				requestNextPhase();
			}, delay);
		}

		function updateByState(state) {
			currentState = state;
			currentScores = state.scores || {};
			currentPlayerNames = state.playerNames || {};
			reconcileMyNameFromServer(state);
			currentPlayerAvatars = state.playerAvatars || {};
			lastStateUpdateMs = Number(state.lastUpdateMs || 0);
			currentGuessed = state.quizGuessedPlayers || {};
			currentArtistHints = state.quizArtistHintPlayers || {};
			currentQuizWrong = state.quizWrongPlayers || {};
			currentQuizWrongGuesses = state.quizWrongGuesses || {};
			currentQuizGuessHistory = state.quizGuessHistory || {};
			const revealOn = Boolean(state.quizRevealActive);
			if (isAdmin() && document.activeElement !== quizRoundLimitInput) {
				const limSync = Number(state.quizRoundLimit || 0);
				if (Number.isFinite(limSync)) {
					quizRoundLimitInput.value = String(limSync);
				}
			}
			const limHint = Number(state.quizRoundLimit || 0);
			const playedHint = Number(state.quizRoundsPlayed || 0);
			if (limHint > 0) {
				quizRoundLimitHint.textContent =
					"Zagranych utworow w sesji: " + String(playedHint) + " / " + String(limHint);
			} else {
				quizRoundLimitHint.textContent =
					"Bez limitu — zagranych utworow w tej sesji: " + String(playedHint);
			}
			if (revealOn) {
				const ans = String(state.quizTrackLabel || "").trim();
				const art = String(state.quizTrackArtist || "").trim();
				const tit = String(state.quizTrackTitle || "").trim();
				let html = "";
				if (tit || art) {
					html =
						(tit ? '<div class="reveal-title-line">' + escapeHtml(tit) + "</div>" : "") +
						(art ? '<div class="reveal-artist-line">' + escapeHtml(art) + "</div>" : "");
				} else if (ans) {
					html = '<div class="reveal-title-line">' + escapeHtml(ans) + "</div>";
				} else {
					html = "";
				}
				revealPanel.innerHTML = html;
				revealPanel.classList.remove("reveal-chorus");
				revealPanel.classList.remove("hidden");
			} else {
				revealPanel.innerHTML = "";
				revealPanel.classList.remove("reveal-chorus");
				revealPanel.classList.add("hidden");
			}
			const roundOn = Boolean(state.quizRoundActive);
			const exhausted = Boolean(state.quizRoundsExhausted);
			if (exhausted && !roundOn && !revealOn) {
				quizLimitBanner.textContent =
					"Sesja quizu: osiagniety limit utworow (sobik moze zwiekszyc limit lub zapisac limit od nowa).";
				quizLimitBanner.classList.remove("hidden");
			} else {
				quizLimitBanner.textContent = "";
				quizLimitBanner.classList.add("hidden");
			}
			const myWrong = isQuizWrong(myPlayer);
			const myGuessHistory = Array.isArray(currentQuizGuessHistory[String(myPlayer)])
				? currentQuizGuessHistory[String(myPlayer)]
				: [];
			if ((roundOn || revealOn) && myGuessHistory.length > 0) {
				let histItems = "";
				for (let hi = 0; hi < myGuessHistory.length; hi = hi + 1) {
					histItems = histItems + formatGuessHistoryListItem(myGuessHistory[hi]);
				}
				guessHistoryPanel.innerHTML = "<ol>" + histItems + "</ol>";
				guessHistoryPanel.classList.remove("hidden");
			} else {
				guessHistoryPanel.innerHTML = "";
				guessHistoryPanel.classList.add("hidden");
			}
			const skipsMapEarly = state.quizSkipsUsed || {};
			const skipsUsedEarly = Number(skipsMapEarly[String(myPlayer)] != null ? skipsMapEarly[String(myPlayer)] : 0);
			guessInput.disabled = isPlayerGuessed(myPlayer) || myWrong || !roundOn || revealOn;
			skipPhaseBtn.disabled = guessInput.disabled || skipsUsedEarly >= QUIZ_MAX_SKIPS;
			replayListenBtn.disabled = !roundOn || revealOn || isPlayerGuessed(myPlayer) || myWrong;
			const dursBadge = Array.isArray(state.quizPhaseDurations) ? state.quizPhaseDurations : [0.5, 2, 4, 6];
			const ptsBadge = Array.isArray(state.quizPhasePoints) ? state.quizPhasePoints : [4, 3, 2, 1];
			const lpMapB = state.quizListenPhases || {};
			let idxB = Number(lpMapB[String(myPlayer)]);
			if (!Number.isFinite(idxB)) {
				idxB = 0;
			}
			idxB = Math.max(0, Math.min(Math.floor(idxB), dursBadge.length - 1));
			const secB = Number(dursBadge[idxB]);
			const ptB = ptsBadge[idxB] !== undefined ? ptsBadge[idxB] : 4;
			const skipsUsed = skipsUsedEarly;
			if (roundOn && !revealOn && !myWrong && !isPlayerGuessed(myPlayer) && Number.isFinite(secB)) {
				quizPhaseBadge.textContent =
					"Faza " +
					String(idxB + 1) +
					"/4 · " +
					String(ptB) +
					" pkt przy trafieniu (0 jesli nietrafione) · do " +
					String(secB) +
					" s sluchu · skip " +
					String(skipsUsed) +
					"/4";
				quizPhaseBadge.classList.remove("hidden");
			} else {
				quizPhaseBadge.textContent = "";
				quizPhaseBadge.classList.add("hidden");
			}
			if (myWrong && roundOn) {
				wrongGuessPanel.classList.remove("hidden");
				wrongGuessPanel.innerHTML = "";
				result.textContent = "";
				result.classList.remove("bad");
			} else {
				wrongGuessPanel.classList.add("hidden");
				wrongGuessPanel.innerHTML = "";
				result.classList.remove("bad");
				if (!roundOn && !revealOn) {
					result.textContent = "";
				} else if (roundOn) {
					result.textContent = "";
				} else if (revealOn) {
					result.textContent = "";
				}
			}
			const token = Number(state.quizCommandToken || 0);
			const ltMap = state.quizListenTokens || {};
			const ltMine = Number(ltMap[String(myPlayer)] != null ? ltMap[String(myPlayer)] : 0);
			const roundGuess = Boolean(state.quizRoundActive) && !Boolean(state.quizRevealActive);
			if (token > lastQuizCommandToken) {
				lastQuizCommandToken = token;
				lastQuizListenTokenMine = ltMine;
				playQuizClipFromState(state);
			} else if (roundGuess && ltMine > lastQuizListenTokenMine) {
				lastQuizListenTokenMine = ltMine;
				playQuizClipFromState(state);
			}
			scheduleAutoAdvanceIfNeeded(state);
			updateQuizEndOverlay(state, roundOn, revealOn, exhausted);
			updateAdminUi();
			renderScoreboard();
		}

		async function refreshState() {
			try {
				const state = await fetchJson("/api/buzzer-state");
				updateByState(state);
				setStatus("online");
			} catch (err) {
				setStatus("brak polaczenia z serwerem");
			}
		}

		async function skipPhase() {
			if (skipPhaseInFlight) {
				return;
			}
			if (!myPlayer || isPlayerGuessed(myPlayer) || isQuizWrong(myPlayer)) {
				return;
			}
			if (guessInput.disabled) {
				return;
			}
			skipPhaseInFlight = true;
			try {
				const data = await fetchJson("/api/quiz-skip-phase", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ player: myPlayer, name: myName })
				});
				updateByState(data.state);
				setStatus("OK");
			} catch (err) {
				const msg = err && err.message ? String(err.message) : "blad";
				setStatus(msg);
				refreshState();
			} finally {
				skipPhaseInFlight = false;
			}
		}

		async function markGuess() {
			if (!myPlayer || isPlayerGuessed(myPlayer) || isQuizWrong(myPlayer)) {
				return;
			}
			if (guessInput.disabled) {
				return;
			}
			if (guessSubmitInFlight) {
				return;
			}
			const text = String(guessInput.value || "").trim();
			if (text.length < 3) {
				setStatus("za krotko");
				return;
			}
			guessSubmitInFlight = true;
			hideGuessSuggest();
			try {
				const data = await fetchJson("/api/quiz-guess", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ player: myPlayer, name: myName, guess: text })
				});
				updateByState(data.state);
				if (data.alreadyGuessed || data.alreadyEliminated) {
					guessInput.value = "";
					setStatus("OK");
					return;
				}
				if (data.guessWrong) {
					guessInput.value = "";
					setStatus("zle");
					return;
				}
				if (data.artistHintOnly) {
					setStatus("OK");
				} else {
					guessInput.value = "";
					setStatus("OK");
				}
			} catch (err) {
				const msg = err && err.message ? String(err.message) : "blad";
				setStatus(msg);
				refreshState();
			} finally {
				guessSubmitInFlight = false;
			}
		}

		async function startQuizRound() {
			if (!isAdmin()) { return; }
			try {
				const data = await fetchJson("/api/quiz-start-round", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ name: myName })
				});
				updateByState(data.state);
				setStatus("OK");
			} catch (err) {
				const msg = err && err.message ? String(err.message) : "blad startu rundy";
				setStatus(msg);
			}
		}

		function sendLeaveBeacon() {
			if (!isValidPlayer(myPlayer) || !myName || typeof navigator.sendBeacon !== "function") {
				return;
			}
			const payload = JSON.stringify({ player: myPlayer, name: myName });
			const blob = new Blob([payload], { type: "application/json" });
			navigator.sendBeacon(buildApiUrl("/api/buzzer-leave"), blob);
		}

		function startPolling() {
			if (pollTimer) { clearInterval(pollTimer); }
			pollTimer = setInterval(refreshState, 350);
		}

		{
			const storedPlayer = Number(localStorage.getItem(getStorageKey("player")));
			const storedName = String(localStorage.getItem(getStorageKey("name")) || "").trim();
			if (!isValidPlayer(storedPlayer) || !storedName) {
				goToNickChoice();
			} else {
				myPlayer = storedPlayer;
				myName = safeName(storedName, storedPlayer);
				meInfo.textContent = "Jestes: " + myName + " (gracz " + myPlayer + ")";
				loadVolume();
				updateAdminUi();
				startPolling();
				refreshState();
			}
		}

		saveRoundLimitBtn.addEventListener("click", saveRoundLimit);
		startRoundBtn.addEventListener("click", startQuizRound);
		nextPhaseBtn.addEventListener("click", requestNextPhase);
		autoToggleBtn.addEventListener("click", () => {
			autoAdvanceEnabled = !autoAdvanceEnabled;
			updateAdminUi();
			if (currentState) {
				scheduleAutoAdvanceIfNeeded(currentState);
			}
		});
		stopClipBtn.addEventListener("click", stopCurrentClip);
		volumeRange.addEventListener("input", () => {
			localVolume = clampVolume(volumeRange.value);
			volumeRange.value = String(localVolume);
			localStorage.setItem(getVolumeStorageKey(), String(localVolume));
			applyVolume();
		});
		guessInput.addEventListener("input", () => {
			scheduleDeezerSuggest();
		});
		guessInput.addEventListener("focus", () => {
			scheduleDeezerSuggest();
		});
		guessInput.addEventListener("blur", () => {
			if (suggestHideTimer) {
				clearTimeout(suggestHideTimer);
			}
			suggestHideTimer = setTimeout(hideGuessSuggest, 200);
		});
		guessForm.addEventListener("submit", (event) => {
			event.preventDefault();
			markGuess();
		});
		skipPhaseBtn.addEventListener("click", skipPhase);
		replayListenBtn.addEventListener("click", function () {
			replayLocalQuizClip();
		});
		quizEndCloseBtn.addEventListener("click", dismissQuizEndOverlay);
		quizEndOverlay.addEventListener("click", function (ev) {
			if (ev.target === quizEndOverlay) {
				dismissQuizEndOverlay();
			}
		});
		window.addEventListener("pagehide", sendLeaveBeacon);
	</script>
</body>
</html>
